<!-- ====== PWA : Service Worker inline (cache offline complet) ====== -->
<script>
  // Service Worker généré via Blob URL — fonctionne sans fichier séparé.
  // Cache stratégie : "stale-while-revalidate" pour les ressources externes,
  // "cache-first" pour les assets statiques.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function() {
      try {
        const swCode = `
          const CACHE_NAME = 'science-quest-v1';
          const RUNTIME_CACHE = 'sq-runtime-v1';

          // Installation : on n'a rien à pré-cacher, on laisse le runtime caching faire
          self.addEventListener('install', function(e) {
            self.skipWaiting();
          });

          self.addEventListener('activate', function(e) {
            // Nettoyer les anciens caches
            e.waitUntil(
              caches.keys().then(function(keys) {
                return Promise.all(keys.filter(function(k) {
                  return k !== CACHE_NAME && k !== RUNTIME_CACHE;
                }).map(function(k) { return caches.delete(k); }));
              }).then(function() { return self.clients.claim(); })
            );
          });

          // Fetch handler : cache-first avec mise à jour en arrière-plan
          self.addEventListener('fetch', function(event) {
            const req = event.request;
            // Ne gérer que les GET
            if (req.method !== 'GET') return;
            // Ignorer les requêtes externes non-cachables (ex: analytics, ws)
            if (req.url.indexOf('chrome-extension') !== -1) return;
            if (req.url.indexOf('googletagmanager') !== -1) return;
            if (req.url.indexOf('google-analytics') !== -1) return;

            event.respondWith(
              caches.match(req).then(function(cached) {
                const fetchPromise = fetch(req).then(function(response) {
                  if (response && response.status === 200 && response.type !== 'opaque') {
                    const respClone = response.clone();
                    caches.open(RUNTIME_CACHE).then(function(cache) {
                      cache.put(req, respClone).catch(function(){});
                    });
                  }
                  return response;
                }).catch(function() {
                  // Si offline et la ressource n'est pas en cache, on retourne ce qu'on a
                  return cached;
                });
                // Stale-while-revalidate : retourne le cache d'abord si dispo, fetch en parallèle
                return cached || fetchPromise;
              })
            );
          });

          // Permettre au client de demander une mise à jour
          self.addEventListener('message', function(event) {
            if (event.data === 'SKIP_WAITING') self.skipWaiting();
          });
        `;
        const blob = new Blob([swCode], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        navigator.serviceWorker.register(swUrl, { scope: './' })
          .then(function(reg) {
            console.log('Service Worker enregistré pour le mode hors-ligne');
            // Auto-update toutes les heures si l'app reste ouverte
            setInterval(function() { reg.update().catch(function(){}); }, 3600000);
          })
          .catch(function(err) { console.warn('Service Worker non disponible:', err); });
      } catch(e) { console.warn('PWA non supportée sur ce navigateur:', e); }
    });
  }
</script>

const SoundManager = {
  ctx: null,
  enabled: true,
  init() {
    if (!this.ctx && typeof window !== 'undefined') {
      try {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) this.ctx = new AC();
      } catch(e) {}
    }
    return this.ctx;
  },
  setEnabled(v) { this.enabled = !!v; },
  tone(freq, duration, type, vol, when) {
    type = type || 'sine'; vol = vol || 0.12; when = when || 0;
    if (!this.enabled) return;
    const ctx = this.init();
    if (!ctx) return;
    try { if (ctx.state === 'suspended') ctx.resume(); } catch(e){}
    try {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      const now = ctx.currentTime + when;
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(vol, now + 0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.05);
    } catch(e) {}
  },
  play(type) {
    if (!this.enabled) return;
    switch(type) {
      case 'correct':

  // ---- Initialisation paresseuse ----
  ensureCtx() {
    if (this.ctx) return this.ctx;
    if (typeof window === 'undefined') return null;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      this.ctx = new AC();
      // Master gain
      this.master = this.ctx.createGain();
      this.master.gain.value = 0;

      comp.threshold.value = -18;

      comp.attack.value = 0.05;
      comp.release.value = 0.3;
      this.master.connect(comp).connect(this.ctx.destination);

      const reverbIn = this.ctx.createGain();

      const d2 = this.ctx.createDelay(2.0); d2.delayTime.value = 0.053;
      const d3 = this.ctx.createDelay(2.0); d3.delayTime.value = 0.071;
      const fb = this.ctx.createGain(); fb.gain.value = 0.42;
      const lp = this.ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 2400;
      const ret = this.ctx.createGain(); ret.gain.value = 0.55;
      reverbIn.connect(d1); d1.connect(d2); d2.connect(d3);
      d3.connect(lp).connect(fb); fb.connect(d1);
      d3.connect(ret).connect(this.master);
      this.reverbBus = reverbIn;
      this.reverbReturn = ret;

        try { if (ctx.state === 'suspended') ctx.resume(); } catch(e){}
        if (ctx.state === 'running') {

          this.master.gain.cancelScheduledValues(t);

  pulse(name) {

    if (!recipe.duration) return;
    const previousMood = this.currentMood;

    Object.entries(recipe.voices).forEach(([id, params]) => {
      this._startVoice('pulse_' + id + '_' + Date.now(), id.replace(/_.*/, ''), params);
    });

    setTimeout(() => {
      Object.keys(this.voices).filter(k => k.startsWith('pulse_')).forEach(k => this._stopVoice(k, 0.6));

      } else if (recipe.next) {

      setTimeout(() => {
        if (this.currentMood === name) this.setMood(recipe.next);
      }, recipe.duration * 1000);

  _startVoice(key, type, params) {
    if (this.voices[key]) return;

      switch(type) {
        case 'pad':
        case 'padSoft':
        case 'padFocus':

  _stopVoice(key, fadeSec) {
    const v = this.voices[key];
    if (!v) return;
    delete this.voices[key];
    try { v.stop(fadeSec || 0.6); } catch(e){}
  },
  _stopAllVoices() {
    Object.keys(this.voices).forEach(k => this._stopVoice(k, 0.4));

  // ============== GÉNÉRATEURS DE VOIX ==============

  _makePad(p) {
    const ctx = this.ctx;
    const root = p.root;
    const chord = p.chord || [0, 4, 7];
    const detune = p.detune || 5;
    const attack = p.attack || 2;
    const g = ctx.createGain();
    g.gain.value = 0;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 1400;
    filt.Q.value = 0.7;
    g.connect(filt);
    // Routage : direct + reverb
    const dry = ctx.createGain(); dry.gain.value = 0.7;
    const wet = ctx.createGain(); wet.gain.value = 0.6;
    filt.connect(dry).connect(this.master);
    filt.connect(wet).connect(this.reverbBus);

    const oscs = [];
    // Création des voix avec espacement stéréo (panoramique gauche/droite)
    // Chaque note du chord est légèrement panée, créant une image stéréo large et organique
    chord.forEach((semitone, idx) => {
      const freq = root * Math.pow(2, semitone / 12);
      // Pan : -0.6 à +0.6 selon la position dans le chord
      const panValue = chord.length > 1 ? ((idx / (chord.length - 1)) - 0.5) * 1.2 : 0;
      [-1, 1].forEach((side, sideIdx) => {
        const o = ctx.createOscillator();
        o.type = 'sawtooth';
        o.frequency.value = freq;
        o.detune.value = detune * side;
        const og = ctx.createGain();
        og.gain.value = 0.10 / chord.length;
        // Panner stéréo : voix gauche + voix droite légèrement décalées
        const panner = (typeof ctx.createStereoPanner === 'function') ? ctx.createStereoPanner() : null;
        if (panner) {
          panner.pan.value = Math.max(-1, Math.min(1, panValue + side * 0.15));
          o.connect(og).connect(panner).connect(g);
        } else {
          o.connect(og).connect(g);
        }
        o.start();
        oscs.push(o);
      });
    });

    // LFO principal sur le filtre — cycle 12s pour respiration lente
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.083; // ~12s
    const lfoG = ctx.createGain(); lfoG.gain.value = 350;
    lfo.connect(lfoG).connect(filt.frequency);
    lfo.start();

    // Second LFO sur le pan (auto-pan subtil) si stéréo dispo
    let panLfo = null;
    if (typeof ctx.createStereoPanner === 'function') {
      const masterPanner = ctx.createStereoPanner();
      masterPanner.pan.value = 0;
      // On insère le panner master entre filt et dry
      try {
        filt.disconnect(dry);
        filt.connect(masterPanner).connect(dry);
        panLfo = ctx.createOscillator();
        panLfo.type = 'sine';
        panLfo.frequency.value = 0.04; // cycle 25s, très lent
        const panLfoG = ctx.createGain(); panLfoG.gain.value = 0.15;
        panLfo.connect(panLfoG).connect(masterPanner.pan);
        panLfo.start();
      } catch(e) {}
    }

    // Modulation harmonique légère via détune coordonné
    let harmonicLfoTimer = null;
    let cycle = 0;
    const harmonicVariation = () => {
      // Toutes les 16s, on transpose légèrement le pad d'un demi-ton vers le haut puis bas
      cycle = (cycle + 1) % 4;
      const mods = [0, 200, 0, -100]; // I → ~II (un peu monté) → I → bVII (légèrement descendu) en cents
      const target = mods[cycle];

        const baseDetune = (i % 2 === 0) ? -detune : detune;
        try {
          o.detune.cancelScheduledValues(ctx.currentTime);
          o.detune.linearRampToValueAtTime(baseDetune + target, ctx.currentTime + 8);
        } catch(e) {}
      });
    };
    harmonicLfoTimer = setInterval(harmonicVariation, 16000);

    const t = ctx.currentTime;
    g.gain.linearRampToValueAtTime(p.vol || 0.3, t + attack);

    return {
      stop: (fade) => {
        const tt = ctx.currentTime;
        g.gain.cancelScheduledValues(tt);
        g.gain.setValueAtTime(g.gain.value, tt);
        g.gain.linearRampToValueAtTime(0, tt + fade);
        if (harmonicLfoTimer) clearInterval(harmonicLfoTimer);
        setTimeout(() => {
          oscs.forEach(o => { try { o.stop(); } catch(e){} });
          try { lfo.stop(); } catch(e){}
          try { if (panLfo) panLfo.stop(); } catch(e){}
        }, fade * 1000 + 100);
      }
    };
  },

  _makeDrone(p) {
    const ctx = this.ctx;
    const out = ctx.createGain(); out.gain.value = 0;

    // Filtre passe-bas chaud (plus bas que l'ancien pour adoucir)

    const sub = ctx.createOscillator();

    [-7, -3, 3, 7].forEach(detune => {

      o.frequency.value = baseFreq;
      o.detune.value = detune;
      const g = ctx.createGain(); g.gain.value = 0.16;
      o.connect(g).connect(out);
      o.start();
      oscs.push(o);
    });

    if (p.harmonic) {
      [-5, 5].forEach(detune => {
        const o = ctx.createOscillator();
        o.type = 'sine';
        o.frequency.value = p.harmonic;
        o.detune.value = detune;
        const g = ctx.createGain(); g.gain.value = (p.harmVol || 0.3) * 0.45;
        o.connect(g).connect(out);
        o.start();
        oscs.push(o);
      });
    }

    // OCTAVE supérieure très douce pour brillance et clarté
    const oct = ctx.createOscillator();
    oct.type = 'sine';
    oct.frequency.value = baseFreq * 2;
    const octG = ctx.createGain(); octG.gain.value = 0.05;
    oct.connect(octG).connect(out);
    oct.start();
    oscs.push(oct);

    // LFO sur le filtre — très lent (cycle 20s) pour mouvement organique imperceptible
    const lfo = ctx.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = 0.05;
    const lfoG = ctx.createGain(); lfoG.gain.value = 250;
    lfo.connect(lfoG).connect(filt.frequency);
    lfo.start();

    // LFO de "respiration" sur le gain pour vie subtile
    const breathLfo = ctx.createOscillator();
    breathLfo.type = 'sine';
    breathLfo.frequency.value = 0.08;
    const breathG = ctx.createGain(); breathG.gain.value = 0.035;
    breathLfo.connect(breathG).connect(out.gain);
    breathLfo.start();

    // Attaque très longue pour entrée imperceptible (4s)
    const t = ctx.currentTime;
    out.gain.linearRampToValueAtTime(p.vol, t + 4.0);

    return {
      stop: (fade) => {
        const tt = ctx.currentTime;
        out.gain.cancelScheduledValues(tt);
        out.gain.setValueAtTime(out.gain.value, tt);
        out.gain.linearRampToValueAtTime(0, tt + fade);
        setTimeout(() => {
          oscs.forEach(o => { try { o.stop(); } catch(e){} });
          try { lfo.stop(); } catch(e){}
          try { breathLfo.stop(); } catch(e){}
        }, fade * 1000 + 200);
      }
    };
  },

  _makeShimmer(p) {
    const ctx = this.ctx;
    const out = ctx.createGain(); out.gain.value = 0;
    out.connect(this.reverbBus);
    let intervalId = null;
    let stopped = false;
    const playNote = () => {
      if (stopped) return;
      const f = p.root * (Math.random() < 0.5 ? 1 : 1.498);
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = ctx.createGain(); g.gain.value = 0;
      o.connect(g).connect(out); o.start();
      const t = ctx.currentTime;
      g.gain.linearRampToValueAtTime(0.6, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 1.8);
      setTimeout(() => { try { o.stop(); } catch(e){} }, 2000);
    };
    intervalId = setInterval(playNote, 1000 / (p.rate || 0.13) * 0.001 + 4000);
    // Premier coup après 2s
    setTimeout(playNote, 2000);
    const t = ctx.currentTime;
    out.gain.linearRampToValueAtTime(p.vol || 0.18, t + 3);
    return {
      stop: (fade) => {
        stopped = true;
        clearInterval(intervalId);
        const tt = ctx.currentTime;
        out.gain.cancelScheduledValues(tt);
        out.gain.linearRampToValueAtTime(0, tt + fade);
      }
    };
  },

  _makeMelodicLoop(p, type) {
    const ctx = this.ctx;
    const out = ctx.createGain(); out.gain.value = 0;
    const dry = ctx.createGain(); dry.gain.value = 0.7;
    const wet = ctx.createGain(); wet.gain.value = 0.5;
    out.connect(dry).connect(this.master);
    out.connect(wet).connect(this.reverbBus);

    const notes = p.notes || [220, 261.63, 329.63];
    const bpm = p.bpm || 80;
    const interval = 60000 / bpm;
    let stopped = false;
    let idx = 0;
    const playNote = () => {
      if (stopped) return;
      const f = notes[idx % notes.length]; idx++;
      const isPiano = type === 'piano' || type === 'bell';
      const isFolk = type === 'folk';
      const o = ctx.createOscillator();
      o.type = isPiano ? 'sine' : (isFolk ? 'triangle' : 'triangle');
      o.frequency.value = f;
      const g = ctx.createGain(); g.gain.value = 0;
      const filt = ctx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = isPiano ? 3000 : 1800;
      o.connect(filt).connect(g).connect(out);
      o.start();
      const t = ctx.currentTime;
      const dur = isPiano ? 1.4 : 0.45;
      g.gain.linearRampToValueAtTime(0.5, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      setTimeout(() => { try { o.stop(); } catch(e){} }, dur * 1000 + 100);
    };
    const intervalId = setInterval(playNote, interval);
    setTimeout(playNote, 200);
    const t = ctx.currentTime;
    out.gain.linearRampToValueAtTime(p.vol || 0.15, t + 1.5);
    return {
      stop: (fade) => {
        stopped = true;
        clearInterval(intervalId);
        const tt = ctx.currentTime;
        out.gain.cancelScheduledValues(tt);
        out.gain.linearRampToValueAtTime(0, tt + fade);
      }
    };
  },

  _makePulse(p, type) {
    const ctx = this.ctx;
    const out = ctx.createGain(); out.gain.value = 0;
    out.connect(this.master);
    const bpm = p.bpm || 72;
    const interval = (60000 / bpm) * (type === 'kickSoft' ? 1 : 2); // kick à chaque temps, pulse plus rare
    let stopped = false;
    const trigger = () => {
      if (stopped) return;
      const o = ctx.createOscillator(); o.type = 'sine';
      o.frequency.value = p.freq || 60;
      const g = ctx.createGain(); g.gain.value = 0;
      o.connect(g).connect(out); o.start();
      const t = ctx.currentTime;
      g.gain.linearRampToValueAtTime(1.0, t + 0.005);
      o.frequency.exponentialRampToValueAtTime((p.freq || 60) * 0.5, t + 0.1);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
      setTimeout(() => { try { o.stop(); } catch(e){} }, 250);
    };
    const id = setInterval(trigger, interval);
    setTimeout(trigger, 100);
    const t = ctx.currentTime;
    out.gain.linearRampToValueAtTime(p.vol || 0.20, t + 1);
    return {
      stop: (fade) => {
        stopped = true;
        clearInterval(id);
        const tt = ctx.currentTime;
        out.gain.cancelScheduledValues(tt);
        out.gain.linearRampToValueAtTime(0, tt + fade);
      }
    };
  },

  _makeRiser(p) {
    const ctx = this.ctx;
    const out = ctx.createGain(); out.gain.value = 0;
    const wet = ctx.createGain(); wet.gain.value = 0.7;
    out.connect(this.master);
    out.connect(wet).connect(this.reverbBus);
    const o = ctx.createOscillator(); o.type = 'sawtooth';
    o.frequency.value = p.from || 110;
    const filt = ctx.createBiquadFilter();
    filt.type = 'lowpass'; filt.frequency.value = 400;
    o.connect(filt).connect(out); o.start();
    const t = ctx.currentTime;
    const dur = p.dur || 2.5;
    o.frequency.exponentialRampToValueAtTime(p.to || 440, t + dur);
    filt.frequency.linearRampToValueAtTime(3000, t + dur);
    out.gain.linearRampToValueAtTime(p.vol || 0.25, t + dur * 0.7);
    out.gain.linearRampToValueAtTime(0, t + dur);
    setTimeout(() => { try { o.stop(); } catch(e){} }, dur * 1000 + 200);
    return { stop: () => {} };
  },

  _makeHit(p) {
    const ctx = this.ctx;
    const out = ctx.createGain(); out.gain.value = 0;
    const wet = ctx.createGain(); wet.gain.value = 0.6;
    out.connect(this.master);
    out.connect(wet).connect(this.reverbBus);
    const delay = p.delay || 0;
    const startAt = ctx.currentTime + delay;
    const freqs = [p.freq, ...(p.harm || [])];
    const oscs = [];
    freqs.forEach((f, i) => {
      const o = ctx.createOscillator();
      o.type = i === 0 ? 'triangle' : 'sine';
      o.frequency.value = f;
      const g = ctx.createGain(); g.gain.value = 0;
      o.connect(g).connect(out);
      o.start(startAt);
      g.gain.setValueAtTime(0, startAt);
      g.gain.linearRampToValueAtTime((p.vol || 0.3) / freqs.length, startAt + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, startAt + 1.2);
      o.stop(startAt + 1.4);
      oscs.push(o);
    });
    return { stop: () => {} };
  },

  _makeOneShotMelody(p) {
    const ctx = this.ctx;
    const out = ctx.createGain(); out.gain.value = p.vol || 0.3;
    const wet = ctx.createGain(); wet.gain.value = 0.6;
    out.connect(this.master);
    out.connect(wet).connect(this.reverbBus);
    const notes = p.notes || [];
    const bpm = p.bpm || 200;
    const interval = 60 / bpm;
    notes.forEach((freq, i) => {
      const startAt = ctx.currentTime + i * interval;
      const o = ctx.createOscillator(); o.type = 'sine';
      o.frequency.value = freq;
      const g = ctx.createGain(); g.gain.value = 0;
      o.connect(g).connect(out);
      o.start(startAt);
      g.gain.setValueAtTime(0, startAt);
      g.gain.linearRampToValueAtTime(0.5, startAt + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, startAt + 0.6);
      o.stop(startAt + 0.7);
    });
    return { stop: () => {} };
  },

  _makeChordHit(p) {
    const ctx = this.ctx;
    const out = ctx.createGain(); out.gain.value = 0;
    const wet = ctx.createGain(); wet.gain.value = 0.7;
    out.connect(this.master);
    out.connect(wet).connect(this.reverbBus);
    const startAt = ctx.currentTime;
    const dur = p.dur || 1.2;
    (p.freqs || [523.25, 659.25, 783.99]).forEach(freq => {
      const o = ctx.createOscillator(); o.type = 'triangle';
      o.frequency.value = freq;
      const g = ctx.createGain(); g.gain.value = 0;
      o.connect(g).connect(out);
      o.start(startAt);
      g.gain.linearRampToValueAtTime(0.3, startAt + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, startAt + dur);
      o.stop(startAt + dur + 0.1);
    });
    out.gain.setValueAtTime(p.vol || 0.4, startAt);
    return { stop: () => {} };
  }
};

function pickMentorMsg(mentorId, kind) {
  const m = MENTORS[mentorId];
  if (!m || !m[kind] || !m[kind].length) return null;

}

// Pour une mission donnée, retourne une rotation de mentors (avec Kotchami toujours présent).
// La rotation puise dans la liste élargie de personnages selon le contexte de la mission.
function pickMentorRotation(missionId) {
  const id = missionId || '';
  // Hashage simple du missionId pour varier la composition d'une mission à l'autre
  let h = 0; for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0;
  const pickFrom = (arr, n) => {
    const out = [];
    let seed = Math.abs(h);
    const copy = arr.slice();
    while (out.length < n && copy.length) {
      const idx = seed % copy.length;
      out.push(copy.splice(idx, 1)[0]);
      seed = Math.floor(seed / 7) + 13;
    }
    return out;
  };

  if (id.startsWith('nl-')) {
    // NEUROLINK : rotation parmi l'équipe médicale
    const pool = ['salamatou', 'moctar', 'blandine', 'moustapha', 'appoline', 'florentine', 'hamza', 'rachel', 'fatima', 'saratou'];
    return [...pickFrom(pool, 3), 'kotchami']; // 3 médecins variés + Kotchami
  }
  if (id.startsWith('gc-')) {
    // GENECODE : rotation parmi les généticiens et superviseurs
    const pool = ['mariama', 'altine', 'matthieu', 'bernadette', 'fatima', 'salamatou', 'saratou'];
    return [...pickFrom(pool, 3), 'kotchami']; // 3 généticiens variés + Kotchami
  }
  // Tuto drépanocytose : Mariama (génétique), Salamatou (clinique), Bernadette (obstétrique pour la famille), Kotchami (philo)
  return ['mariama', 'salamatou', 'bernadette', 'kotchami'];
}

// PWA — Hook d'installation et indicateur offline
// ============================================================
function usePWAInstall() {
  const [installPrompt, setInstallPrompt] = React.useState(null);
  const [installed, setInstalled] = React.useState(false);
  const [dismissed, setDismissed] = React.useState(() => {
    try { return localStorage.getItem('sq_install_dismissed') === '1'; } catch(e) { return false; }
  });

  React.useEffect(() => {
    // Détecter si déjà installée (mode standalone)
    const isStandalone = (typeof window !== 'undefined') && (
      window.matchMedia('(display-mode: standalone)').matches ||
      window.navigator.standalone === true
    );
    if (isStandalone) setInstalled(true);

    // Capturer l'événement d'installation (Chrome/Edge/Android)
    const handler = (e) => {
      e.preventDefault();
      setInstallPrompt(e);
    };
    if (typeof window !== 'undefined') {
      window.addEventListener('beforeinstallprompt', handler);
      window.addEventListener('appinstalled', () => setInstalled(true));
    }
    return () => {
      if (typeof window !== 'undefined') window.removeEventListener('beforeinstallprompt', handler);
    };
  }, []);

  const promptInstall = async () => {
    if (!installPrompt) return false;
    try {
      installPrompt.prompt();
      const { outcome } = await installPrompt.userChoice;
      if (outcome === 'accepted') setInstalled(true);
      setInstallPrompt(null);
      return outcome === 'accepted';
    } catch(e) { return false; }
  };

  const dismiss = () => {
    setDismissed(true);
    try { localStorage.setItem('sq_install_dismissed', '1'); } catch(e) {}
  };

  return { canInstall: !!installPrompt && !installed && !dismissed, installed, promptInstall, dismiss };
}

function useOnlineStatus() {
  const [online, setOnline] = React.useState(typeof navigator !== 'undefined' ? navigator.onLine : true);
  React.useEffect(() => {
    if (typeof window === 'undefined') return;
    const goOnline = () => setOnline(true);
    const goOffline = () => setOnline(false);
    window.addEventListener('online', goOnline);
    window.addEventListener('offline', goOffline);
    return () => {
      window.removeEventListener('online', goOnline);
      window.removeEventListener('offline', goOffline);
    };
  }, []);
  return online;
}

function useMissionTimer(active) {
  const [seconds, setSeconds] = React.useState(0);
  React.useEffect(() => {
    if (!active) { setSeconds(0); return; }
    const start = Date.now();
    const interval = setInterval(() => {
      setSeconds(Math.floor((Date.now() - start) / 1000));
    }, 1000);
    return () => clearInterval(interval);
  }, [active]);
  return seconds;
}
function formatTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + sec.toString().padStart(2, '0');
}
function todayStr() { return new Date().toISOString().split('T')[0]; }
function yesterdayStr() { return new Date(Date.now() - 86400000).toISOString().split('T')[0]; }
function updateStreak(state) {
  const today = todayStr();
  if (state.lastPlayDate === today) return state;
  let streakDays;
  if (state.lastPlayDate === yesterdayStr()) streakDays = (state.streakDays || 0) + 1;
  else streakDays = 1;
  return { ...state, lastPlayDate: today, streakDays };
}

// Régénère 1 vie toutes les 30 minutes (jusqu'à maxLives)
function regenLives(state) {
  const maxLives = state.maxLives || 3;
  if ((state.lives || 0) >= maxLives) {
    return { ...state, lastLifeRegen: Date.now() };
  }
  const REGEN_MS = 30 * 60 * 1000; // 30 minutes
  const now = Date.now();
  const last = state.lastLifeRegen || now;
  const elapsed = now - last;
  if (elapsed < REGEN_MS) return state;
  const livesToAdd = Math.min(maxLives - state.lives, Math.floor(elapsed / REGEN_MS));
  if (livesToAdd <= 0) return state;
  return {
    ...state,
    lives: Math.min(maxLives, state.lives + livesToAdd),
    lastLifeRegen: last + livesToAdd * REGEN_MS
  };
}

// MISSION PLAYER — Moteur générique data-driven
// Joue n'importe quelle mission de MISSIONS_DATA via une seule interface
// Architecture : intro → prologue → briefing → phases[] → epilogue
// ============================================================

function MissionPlayer({ missionId, state, setState, onExit }) {
  const mission = MISSIONS_DATA[missionId];
  if (!mission) {
    return (
      <div className="text-center py-20">
        <p className="text-red-400">Mission introuvable : {missionId}</p>
        <button onClick={onExit} className="mt-6 btn-primary px-6 py-2 rounded-full">Retour à l'Académie</button>
      </div>
    );
  }

  const [step, setStep] = React.useState('intro'); // intro | prologue | briefing | phaseN | epilogue
  const [currentPhaseIdx, setCurrentPhaseIdx] = React.useState(0);
  const [missionXP, setMissionXP] = React.useState(0);
  const [phaseAnswered, setPhaseAnswered] = React.useState({});
  const [missionLives, setMissionLives] = React.useState(3);
  const [mentorMsg, setMentorMsg] = React.useState(null);
  const [correctStreak, setCorrectStreak] = React.useState(0);

  // Chronomètre actif pendant les phases
  const timerActive = step !== 'intro' && step !== 'epilogue';
  const elapsedSeconds = useMissionTimer(timerActive);

  // Rotation des mentors pour cette mission (3-4 mentors différents apparaissent)
  const mentorRotation = React.useMemo(() => pickMentorRotation(missionId), [missionId]);

  const showMentor = (mentorId, msg) => {
    if (state.mentorEnabled === false) return;
    if (!msg) return;
    setMentorMsg({ char: mentorId, msg, key: Date.now() });
  };
  // Helper : prendre un mentor aléatoire dans la rotation puis afficher son message
  const showMentorFrom = (kind, indexHint) => {
    if (state.mentorEnabled === false) return;
    const mentorId = mentorRotation[(indexHint != null ? indexHint : Math.floor(Math.random() * mentorRotation.length)) % mentorRotation.length];
    const msg = pickMentorMsg(mentorId, kind);
    if (msg) showMentor(mentorId, msg);
  };

  const totalPhases = mission.phases.length;

  // Navigation
  const allSteps = ['intro', 'prologue', 'briefing', ...mission.phases.map((_, i) => `phase${i}`), 'epilogue'];
  const currentStepIdx = allSteps.indexOf(step);
  const progress = (currentStepIdx / (allSteps.length - 1)) * 100;

  // Apparitions automatiques du mentor à des moments stratégiques
  // Kotchami est GARANTI au briefing (intro philosophique) et à l'épilogue (clôture)
  React.useEffect(() => {
    if (state.mentorEnabled === false) return;
    if (step === 'briefing') {
      // Intro : Kotchami philosophe (toujours), puis spécialiste matière à phase 0
      setTimeout(() => showMentor('kotchami', pickMentorMsg('kotchami', 'intro')), 700);
    } else if (step === 'phase0') {
      // Spécialiste de la matière prend le relais
      setTimeout(() => showMentorFrom('intro', 0), 600);
    } else if (step.startsWith('phase')) {
      const idx = parseInt(step.replace('phase', ''));
      // À mi-parcours : message de soutien (Kotchami philosophe le plus souvent)
      const half = Math.floor(totalPhases / 2);
      if (idx === half && half > 0) {
        setTimeout(() => showMentor('kotchami', pickMentorMsg('kotchami', 'midway')), 800);
      }
    } else if (step === 'epilogue') {
      // Clôture : Kotchami signe la mission avec une phrase d'identité
      setTimeout(() => showMentor('kotchami', pickMentorMsg('kotchami', 'outro')), 1200);
    }
    // eslint-disable-next-line
  }, [step]);

  // Mood musical adaptatif selon l'étape
  React.useEffect(() => {
    if (step === 'intro') MusicEngine.setMood('exploration');
    else if (step === 'prologue' || step === 'briefing') MusicEngine.setMood('activation');
    else if (step.startsWith('phase')) {
      // Tension si plus qu'une vie
      if (missionLives <= 1) MusicEngine.setMood('tension');
      else MusicEngine.setMood('concentration');
    }
    else if (step === 'epilogue') MusicEngine.setMood('reflexion');
    // eslint-disable-next-line
  }, [step, missionLives]);

  const goNext = () => {
    if (step === 'intro') setStep('prologue');
    else if (step === 'prologue') setStep('briefing');
    else if (step === 'briefing') { setCurrentPhaseIdx(0); setStep('phase0'); }
    else if (step.startsWith('phase')) {
      const idx = parseInt(step.replace('phase', ''));
      if (idx + 1 < totalPhases) { setCurrentPhaseIdx(idx + 1); setStep(`phase${idx + 1}`); }
      else setStep('epilogue');
    }
  };

  const goPrevious = () => {
    if (currentStepIdx > 0) setStep(allSteps[currentStepIdx - 1]);
  };

  const onPhaseCorrect = (xp) => {
    const newStreak = correctStreak + 1;
    // Combo : +20% à 3 d'affilée, +50% à 5 d'affilée
    let multiplier = 1;
    if (newStreak >= 5) multiplier = 1.5;
    else if (newStreak >= 3) multiplier = 1.2;
    const finalXp = Math.round(xp * multiplier);
    setMissionXP(x => x + finalXp);
    setPhaseAnswered(p => ({ ...p, [step]: { correct: true, xp: finalXp, combo: multiplier > 1 } }));
    SoundManager.play('correct');
    MusicEngine.pulse('validation');
    setCorrectStreak(newStreak);
    // Tracking stats globales
    setState(s => ({
      ...s,
      totalQuestionsAnswered: (s.totalQuestionsAnswered || 0) + 1,
      totalCorrectAnswers: (s.totalCorrectAnswers || 0) + 1,
      bestStreak: Math.max(s.bestStreak || 0, newStreak)
    }));
    if (newStreak === 3) showMentorFrom('success3', 0); // mentor spécialiste
    else if (newStreak === 5) showMentorFrom('success5', 2); // Kotchami
  };

  const onPhaseWrong = () => {
    setMissionLives(l => Math.max(0, l - 1));
    setPhaseAnswered(p => ({ ...p, [step]: { correct: false, xp: 0 } }));
    SoundManager.play('wrong');
    MusicEngine.pulse('tension');
    setCorrectStreak(0);
    // Tracking stats globales
    setState(s => ({
      ...s,
      totalQuestionsAnswered: (s.totalQuestionsAnswered || 0) + 1
    }));
    // Après une erreur, varier le mentor (rotation)
    showMentorFrom('wrong', Math.floor(Math.random() * mentorRotation.length));
  };

  const completeMission = () => {
    SoundManager.play('complete');
    MusicEngine.pulse('progression');
    // Bonus rapidité : si la mission est complétée en moins de 8 minutes
    const fastBonus = (elapsedSeconds > 0 && elapsedSeconds < 480) ? 50 : 0;
    const finalXP = missionXP + fastBonus;
    setState(s => {
      const updated = updateStreak({ ...s });
      const records = { ...(updated.missionRecords || {}) };
      const previous = records[missionId];
      if (!previous || elapsedSeconds < previous) records[missionId] = elapsedSeconds;
      // Badge mission ID
      const badges = [...new Set([...(updated.badges || []), 'mission:' + missionId])];
      // Badge éclair si rapide
      if (fastBonus > 0 && !badges.includes('badge:eclair')) badges.push('badge:eclair');
      // Badge streak 7 jours
      if ((updated.streakDays || 0) >= 7 && !badges.includes('badge:streak7')) badges.push('badge:streak7');
      // Mise à jour xpHistory pour le sparkline
      const today = new Date().toISOString().slice(0, 10);
      const xpHistory = [...(updated.xpHistory || [])];
      const todayEntry = xpHistory.find(e => e.date === today);
      if (todayEntry) todayEntry.xp += finalXP;
      else xpHistory.push({ date: today, xp: finalXP });
      // Garder seulement les 30 derniers jours
      const recent = xpHistory.slice(-30);
      return {
        ...updated,
        xp: s.xp + finalXP,
        completedMissions: [...new Set([...s.completedMissions, missionId])],
        grimoireEntries: [...new Set([...s.grimoireEntries, mission.epilogue.grimoire])],
        ibrahimFragments: mission.epilogue.fragmentIbrahim
          ? [...new Set([...(s.ibrahimFragments || []), mission.epilogue.fragmentIbrahim.numero])]
          : (s.ibrahimFragments || []),
        currentRank: Math.max(s.currentRank || 0, mission.rank.to),
        missionRecords: records,
        badges,
        xpHistory: recent
      };
    });
    onExit();
  };

  const phaseLabel = (s) => {
    if (s === 'intro') return 'Intro';
    if (s === 'prologue') return 'Prologue';
    if (s === 'briefing') return 'Briefing';
    if (s === 'epilogue') return 'Épilogue';
    if (s.startsWith('phase')) {
      const i = parseInt(s.replace('phase', ''));
      return `Phase ${i + 1}/${totalPhases}`;
    }
    return s;
  };

  return (
    <div>
      {/* Barre de progression + retour */}
      {step !== 'intro' && step !== 'epilogue' && (
        <div className="mb-6 anim-in">
          <div className="flex items-center justify-between mb-2 gap-3">
            <button
              onClick={goPrevious}
              className="btn-ghost px-3 py-1.5 rounded-full text-xs inline-flex items-center gap-1.5 shrink-0"
              style={{opacity: 1, visibility: 'visible'}}
              title={`Retour à : ${phaseLabel(allSteps[currentStepIdx - 1])}`}
            >
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="m15 18-6-6 6-6"/>
              </svg>
              <span>Retour</span>
            </button>
            <p className="text-[10px] uppercase tracking-wider text-slate-500 text-center flex-1">
              Mission {mission.number} — {phaseLabel(step)}
            </p>
            <div className="text-xs font-mono-sci tabular-nums shrink-0 flex items-center gap-2" style={{minWidth: '90px', justifyContent: 'flex-end'}}>
              {state.timerEnabled !== false && (
                <span className="text-slate-400" title="Temps de mission">⏱ {formatTime(elapsedSeconds)}</span>
              )}
              {correctStreak >= 3 && (
                <span className="px-2 py-0.5 rounded-full text-[10px] font-bold" style={{background: correctStreak >= 5 ? 'rgba(245, 158, 11, 0.3)' : 'rgba(16, 185, 129, 0.2)', color: correctStreak >= 5 ? '#fbbf24' : '#6ee7b7', border: '1px solid ' + (correctStreak >= 5 ? '#f59e0b' : '#10b981')}} title={`Combo x${correctStreak >= 5 ? '1.5' : '1.2'}`}>
                  🔥 x{correctStreak >= 5 ? '1.5' : '1.2'}
                </span>
              )}
              <span className="text-amber-400">+{missionXP}</span>
            </div>
          </div>
          <div className="progress-bar"><div className="progress-bar-fill" style={{width: `${progress}%`}}></div></div>
        </div>
      )}

      {/* Contenus selon l'étape */}
      {step === 'intro' && <MissionIntroV2 mission={mission} onStart={goNext} onBack={onExit} />}
      {step === 'prologue' && <MissionPrologue mission={mission} onNext={goNext} />}
      {step === 'briefing' && <MissionBriefing mission={mission} onNext={goNext} />}
      {step.startsWith('phase') && mission.phases[currentPhaseIdx] && mission.phases[currentPhaseIdx].type === 'narrative' && (
        <MissionPhaseNarrative
          phase={mission.phases[currentPhaseIdx]}
          phaseIdx={currentPhaseIdx}
          totalPhases={totalPhases}
          onNext={goNext}
        />
      )}
      {step.startsWith('phase') && mission.phases[currentPhaseIdx] && mission.phases[currentPhaseIdx].type !== 'narrative' && (
        <MissionPhaseQuestion
          phase={mission.phases[currentPhaseIdx]}
          phaseIdx={currentPhaseIdx}
          totalPhases={totalPhases}
          answered={phaseAnswered[step]}
          onCorrect={onPhaseCorrect}
          onWrong={onPhaseWrong}
          onNext={goNext}
          missionLives={missionLives}
        />
      )}
      {step === 'epilogue' && (
        <MissionEpilogue
          mission={mission}
          missionXP={missionXP}
          state={state}
          setState={setState}
          onComplete={completeMission}
        />
      )}
      {mentorMsg && (
        <MentorBubble
          key={mentorMsg.key}
          character={mentorMsg.char}
          message={mentorMsg.msg}
          onClose={() => setMentorMsg(null)}
        />
      )}
    </div>
  );
}

// ============================================================
// PHASE QUESTION — Composant générique unifié
// Supporte : QCM, V/F + justification, bouton indice
// Les options sont mélangées aléatoirement à chaque affichage
// ============================================================
function MissionPhaseQuestion({ phase, phaseIdx, totalPhases, answered, onCorrect, onWrong, onNext, missionLives, onUseHint }) {
  const [selectedIdx, setSelectedIdx] = React.useState(null);
  const [submitted, setSubmitted] = React.useState(false);
  const [hintUsed, setHintUsed] = React.useState(false);
  const [showHint, setShowHint] = React.useState(false);

  // Détecte le type de question
  const isVraiFaux = phase.type === 'vraifaux';
  const hasJustif = isVraiFaux && phase.justifications && phase.justifications.length > 0;

  // Pour V/F, on construit dynamiquement les options "Vrai" / "Faux"
  // correctIdx est censé être 0 (vrai) ou 1 (faux)
  const baseOptions = isVraiFaux ? ['Vrai', 'Faux'] : phase.options;
  const baseCorrectIdx = phase.correctIdx;

  // Mélange aléatoire (re-mélangé à chaque nouvelle phase)
  const shuffled = React.useMemo(() => {
    const indices = baseOptions.map((_, i) => i);
    // Pas de shuffle pour V/F simple (Vrai/Faux fixe)
    if (isVraiFaux) return indices;
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    return indices;
  // eslint-disable-next-line
  }, [phaseIdx]);
  const displayedOptions = shuffled.map(i => baseOptions[i]);
  const newCorrectIdx = shuffled.indexOf(baseCorrectIdx);
  const correctLetter = String.fromCharCode(65 + newCorrectIdx);

  // Justification (deuxième étape pour V/F)
  const [justifIdx, setJustifIdx] = React.useState(null);
  const [justifSubmitted, setJustifSubmitted] = React.useState(false);
  const justifShuffled = React.useMemo(() => {
    if (!hasJustif) return [];
    const indices = phase.justifications.map((_, i) => i);
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    return indices;
  // eslint-disable-next-line
  }, [phaseIdx]);
  const displayedJustifs = hasJustif ? justifShuffled.map(i => phase.justifications[i]) : [];
  const newCorrectJustifIdx = hasJustif ? justifShuffled.indexOf(phase.correctJustifIdx || 0) : -1;

  // Reset à chaque phase
  React.useEffect(() => {
    setSelectedIdx(null);
    setSubmitted(false);
    setHintUsed(false);
    setShowHint(false);
    setJustifIdx(null);
    setJustifSubmitted(false);
  }, [phaseIdx]);

  const handleSubmit = () => {
    if (selectedIdx === null) return;
    setSubmitted(true);
    const correct = selectedIdx === newCorrectIdx;
    // Si V/F avec justification et bonne réponse Q1 : on attend la justification avant de valider XP
    if (correct && hasJustif) {
      // On ne fait rien — on attend la justification
    } else if (correct) {
      const finalXp = hintUsed ? Math.max(0, phase.xp - 10) : phase.xp;
      onCorrect(finalXp);
    } else {
      onWrong();
    }
  };

  const handleSubmitJustif = () => {
    if (justifIdx === null) return;
    setJustifSubmitted(true);
    if (justifIdx === newCorrectJustifIdx) {
      const finalXp = hintUsed ? Math.max(0, phase.xp - 10) : phase.xp;
      onCorrect(finalXp);
    } else {
      onWrong();
    }
  };

  const useHint = () => {
    if (hintUsed || submitted) return;
    setHintUsed(true);
    setShowHint(true);
    if (onUseHint) onUseHint();
  };

  const isCorrect = selectedIdx === newCorrectIdx;
  const isJustifCorrect = justifIdx === newCorrectJustifIdx;
  const fullyComplete = submitted && (!hasJustif || justifSubmitted || !isCorrect);

  return (
    <div className="max-w-2xl mx-auto">
      <div className="anim-in inline-flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-amber-400/70 mb-4">
        <span>{isVraiFaux ? '⚖️' : '🧪'}</span>
        <span>{phase.title}</span>
        {isVraiFaux && <span className="ml-1 px-2 py-0.5 rounded-full text-[9px]" style={{background: 'rgba(139,92,246,0.15)', color: '#c4b5fd', border: '1px solid rgba(139,92,246,0.4)'}}>VRAI/FAUX</span>}
      </div>
      <h2 className="anim-in delay-100 font-display text-xl md:text-2xl mb-8 text-amber-100 leading-snug">
        {phase.question}
      </h2>

      {showHint && phase.hint && (
        <div className="anim-in card-border rounded-xl p-4 mb-5" style={{background: 'rgba(99, 102, 241, 0.06)', borderColor: 'rgba(99, 102, 241, 0.4)'}}>
          <div className="flex items-start gap-2">
            <span className="text-xl shrink-0">💡</span>
            <div className="flex-1">
              <p className="text-[10px] uppercase tracking-wider mb-1" style={{color: '#a5b4fc'}}>Indice (–10 XP)</p>
              <p className="text-slate-200 text-sm leading-relaxed">{phase.hint}</p>
            </div>
          </div>
        </div>
      )}

      <div className="space-y-3 mb-6">
        {displayedOptions.map((opt, i) => {
          const isSelected = selectedIdx === i;
          const isCorrectAnswer = i === newCorrectIdx;
          let extraStyle = {};
          if (submitted) {
            if (isCorrectAnswer) extraStyle = { borderColor: '#10b981', background: 'rgba(16,185,129,0.08)' };
            else if (isSelected) extraStyle = { borderColor: '#ef4444', background: 'rgba(239,68,68,0.08)' };
          } else if (isSelected) {
            extraStyle = { borderColor: '#f59e0b', background: 'rgba(245,158,11,0.08)' };
          }
          return (
            <button
              key={i}
              onClick={() => !submitted && setSelectedIdx(i)}
              disabled={submitted}
              className={`anim-in w-full text-left p-4 rounded-lg border-2 transition-all ${submitted ? 'cursor-default' : 'cursor-pointer hover:border-amber-500/50'}`}
              style={{
                borderColor: '#334155',
                background: 'rgba(15, 23, 42, 0.4)',
                opacity: 1,
                animationDelay: `${(i+1) * 0.08}s`,
                ...extraStyle
              }}
            >
              <div className="flex items-start gap-3">
                <span className={`shrink-0 w-7 h-7 rounded-full flex items-center justify-center font-mono-sci text-sm border-2 ${submitted && isCorrectAnswer ? 'border-emerald-400 text-emerald-400' : submitted && isSelected ? 'border-red-400 text-red-400' : isSelected ? 'border-amber-400 text-amber-400' : 'border-slate-600 text-slate-500'}`}>
                  {isVraiFaux ? (i === 0 ? 'V' : 'F') : String.fromCharCode(65 + i)}
                </span>
                <span className="text-slate-200 text-sm md:text-base flex-1">{opt}</span>
                {submitted && isCorrectAnswer && <span className="text-emerald-400 text-lg">✓</span>}
                {submitted && isSelected && !isCorrectAnswer && <span className="text-red-400 text-lg">✗</span>}
              </div>
            </button>
          );
        })}
      </div>

      {!submitted && (
        <div className="flex items-center justify-center gap-3 flex-wrap">
          {phase.hint && !hintUsed && (
            <button
              onClick={useHint}
              className="btn-ghost px-4 py-2.5 rounded-full inline-flex items-center gap-2 text-xs"
              style={{opacity: 1, color: '#a5b4fc', borderColor: 'rgba(99,102,241,0.4)'}}
            >
              💡 Indice (–10 XP)
            </button>
          )}
          <button
            onClick={handleSubmit}
            disabled={selectedIdx === null}
            className="btn-primary px-8 py-3 rounded-full inline-flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed"
            style={{opacity: selectedIdx !== null ? 1 : 0.4, visibility: 'visible', display: 'inline-flex'}}
          >
            Valider ma réponse
          </button>
        </div>
      )}

      {/* Justification pour V/F (si bonne première réponse) */}
      {submitted && isCorrect && hasJustif && (
        <div className="anim-in mt-6">
          <div className="card-border rounded-xl p-5 mb-5" style={{background: 'rgba(139, 92, 246, 0.06)', borderColor: 'rgba(139, 92, 246, 0.4)'}}>
            <p className="text-[10px] uppercase tracking-wider mb-2" style={{color: '#c4b5fd'}}>Justification — pourquoi ?</p>
            <p className="text-slate-100 text-base">{phase.justifQuestion || 'Choisis la justification correcte :'}</p>
          </div>
          <div className="space-y-3 mb-6">
            {displayedJustifs.map((j, i) => {
              const isSel = justifIdx === i;
              const isOk = i === newCorrectJustifIdx;
              let st = {};
              if (justifSubmitted) {
                if (isOk) st = { borderColor: '#10b981', background: 'rgba(16,185,129,0.08)' };
                else if (isSel) st = { borderColor: '#ef4444', background: 'rgba(239,68,68,0.08)' };
              } else if (isSel) {
                st = { borderColor: '#f59e0b', background: 'rgba(245,158,11,0.08)' };
              }
              return (
                <button
                  key={i}
                  onClick={() => !justifSubmitted && setJustifIdx(i)}
                  disabled={justifSubmitted}
                  className={`w-full text-left p-4 rounded-lg border-2 transition-all ${justifSubmitted ? 'cursor-default' : 'cursor-pointer hover:border-amber-500/50'}`}
                  style={{borderColor: '#334155', background: 'rgba(15, 23, 42, 0.4)', ...st}}
                >
                  <div className="flex items-start gap-3">
                    <span className={`shrink-0 w-7 h-7 rounded-full flex items-center justify-center font-mono-sci text-sm border-2 ${justifSubmitted && isOk ? 'border-emerald-400 text-emerald-400' : justifSubmitted && isSel ? 'border-red-400 text-red-400' : isSel ? 'border-amber-400 text-amber-400' : 'border-slate-600 text-slate-500'}`}>
                      {String.fromCharCode(65 + i)}
                    </span>
                    <span className="text-slate-200 text-sm md:text-base flex-1">{j}</span>
                  </div>
                </button>
              );
            })}
          </div>
          {!justifSubmitted && (
            <div className="text-center">
              <button onClick={handleSubmitJustif} disabled={justifIdx === null}
                className="btn-primary px-8 py-3 rounded-full inline-flex items-center gap-2"
                style={{opacity: justifIdx !== null ? 1 : 0.4}}>
                Valider la justification
              </button>
            </div>
          )}
        </div>
      )}

      {fullyComplete && (
        <div className="anim-in card-border rounded-xl p-5 mb-6 mt-6" style={{background: (isCorrect && (!hasJustif || isJustifCorrect)) ? 'rgba(16,185,129,0.05)' : 'rgba(245,158,11,0.05)', borderColor: (isCorrect && (!hasJustif || isJustifCorrect)) ? '#10b981' : '#f59e0b'}}>
          <div className="flex items-start gap-3">
            <span className="text-2xl shrink-0">{(isCorrect && (!hasJustif || isJustifCorrect)) ? '✓' : '💡'}</span>
            <div className="flex-1">
              <p className="font-display text-base mb-2" style={{color: (isCorrect && (!hasJustif || isJustifCorrect)) ? '#10b981' : '#f59e0b'}}>
                {(isCorrect && (!hasJustif || isJustifCorrect)) ? `Excellent ! +${hintUsed ? Math.max(0, phase.xp - 10) : phase.xp} XP${hintUsed ? ' (indice utilisé)' : ''}` : `Pas tout à fait — la bonne réponse est ${correctLetter}`}
              </p>
              <p className="text-slate-300 text-sm leading-relaxed">{phase.explain}</p>
            </div>
          </div>
        </div>
      )}

      {/* Conséquence narrative en cas d'erreur (immersif) */}
      {fullyComplete && !isCorrect && phase.consequence && (
        <div className="anim-in rounded-xl p-4 mb-6 -mt-2" style={{background: 'rgba(220, 38, 38, 0.08)', border: '1px solid rgba(220, 38, 38, 0.3)'}}>
          <div className="flex items-start gap-3">
            <span className="text-xl shrink-0">⚠️</span>
            <div className="flex-1">
              <p className="text-[10px] uppercase tracking-wider mb-1" style={{color: '#fca5a5'}}>Conséquence dans la mission</p>
              <p className="text-slate-200 text-sm italic leading-relaxed">{phase.consequence}</p>
            </div>
          </div>
        </div>
      )}

      {/* Conséquence positive en cas de succès (renforcement) */}
      {fullyComplete && isCorrect && (!hasJustif || isJustifCorrect) && phase.successOutcome && (
        <div className="anim-in rounded-xl p-4 mb-6 -mt-2" style={{background: 'rgba(16, 185, 129, 0.08)', border: '1px solid rgba(16, 185, 129, 0.3)'}}>
          <div className="flex items-start gap-3">
            <span className="text-xl shrink-0">✨</span>
            <div className="flex-1">
              <p className="text-[10px] uppercase tracking-wider mb-1" style={{color: '#6ee7b7'}}>Impact dans la mission</p>
              <p className="text-slate-200 text-sm italic leading-relaxed">{phase.successOutcome}</p>
            </div>
          </div>
        </div>
      )}

      {fullyComplete && (
        <div className="text-center">
          <button
            onClick={onNext}
            className="btn-primary px-8 py-3 rounded-full inline-flex items-center gap-2"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}
          >
            {phaseIdx + 1 < totalPhases ? 'Phase suivante →' : 'Voir l\'épilogue →'}
          </button>
        </div>
      )}
    </div>
  );
}

// ============================================================
// SYSTÈME D'ENGAGEMENT-ÉCHANGE
// 4 mécaniques : Mission Vie Réelle, Témoignage, Invitation, Bug/Amélioration
// ============================================================
function EngagementEchange({ missionTitle, missionId, state, setState }) {
  const [activeTab, setActiveTab] = React.useState(null);
  const [submitted, setSubmitted] = React.useState({});
  const [testimonyText, setTestimonyText] = React.useState('');
  const [kotchamiReply, setKotchamiReply] = React.useState(null);

  const mecaniques = [
    {
      id: 'vieReelle',
      icon: '❤️',
      titre: 'Mission Vie Réelle',
      sousTitre: 'Gagne 1 cœur supplémentaire',
      description: "Cette semaine, parle à 3 personnes de ton entourage de ce que tu as appris dans cette mission. Reviens valider quand c'est fait.",
      action: "J'accepte cette mission",
      reward: '+ 1 cœur'
    },
    {
      id: 'temoignage',
      icon: '✍️',
      titre: 'Témoignage qualité',
      sousTitre: 'Débloque 100 XP bonus + Kotchami te répond',
      description: "Écris en 3 phrases ce que tu as appris dans cette mission et pourquoi c'est important pour toi. Kotchami te lira et te répondra personnellement.",
      input: true,
      placeholder: "Ce que j'ai appris...",
      action: "Envoyer mon témoignage",
      reward: '+ 100 XP'
    },
    {
      id: 'invitation',
      icon: '👥',
      titre: 'Invite tes amis',
      sousTitre: 'Débloque une mission bonus',
      description: "Partage Science Quest avec 2 amis. Ils peuvent jouer aussi, et tu débloques une mission bonus exclusive.",
      action: "Partager le lien",
      reward: '+ Mission bonus',
      shareText: `Je viens de terminer "${missionTitle}" sur Science Quest 🧬 — la plateforme éducative du Niger qui transforme la science en aventure. Rejoins-moi : `
    },
    {
      id: 'bug',
      icon: '🐛',
      titre: 'Améliore Science Quest',
      sousTitre: 'Gagne 50 XP bonus',
      description: "Tu as remarqué un bug, une coquille, ou tu as une suggestion ? Signale-le directement à Kotchami par e-mail et gagne 50 XP.",
      action: "Envoyer un signalement",
      contactEmail: 'kotchamiogougbe@gmail.com',
      subject: `[Science Quest] Suggestion / Bug - Mission "${missionTitle}"`,
      reward: '+ 50 XP'
    }
  ];

  // Génère une réponse personnalisée de Kotchami selon le contenu du témoignage
  const generateKotchamiReply = (text) => {
    const t = text.toLowerCase();
    const replies = [];

    // Détection de mots-clés émotionnels et thématiques
    if (t.includes('compris') || t.includes('comprendre') || t.includes('compréhension')) {
      replies.push("Tu utilises le mot juste : « comprendre ». Pas mémoriser. Tu as déjà fait la moitié du chemin.");
    }
    if (t.includes('difficile') || t.includes('dur') || t.includes('compliqué')) {
      replies.push("Tu trouves ça difficile, et tu l'écris. C'est ce qu'on appelle de l'honnêteté intellectuelle. Continue.");
    }
    if (t.includes('intéressant') || t.includes('passion') || t.includes('aime')) {
      replies.push("L'intérêt sincère est la première forme d'intelligence. Tu en as. Cultive-la.");
    }
    if (t.includes('santé') || t.includes('médecine') || t.includes('médecin') || t.includes('patient')) {
      replies.push("La science que tu apprends ici sauvera peut-être une vie un jour. C'est la vraie raison de comprendre.");
    }
    if (t.includes('famille') || t.includes('parent') || t.includes('mère') || t.includes('père')) {
      replies.push("Tu fais le lien avec ta famille. C'est exactement ce que je veux : que la science quitte la salle de classe.");
    }
    if (t.includes('niger') || t.includes('afrique')) {
      replies.push("Tu penses à ton continent. La science africaine se construit dans des têtes comme la tienne. Continue.");
    }
    if (t.includes('génétique') || t.includes('adn') || t.includes('chromosome')) {
      replies.push("Tu touches au cœur de la biologie. L'ADN n'a pas de secrets pour ceux qui prennent le temps de l'écouter.");
    }
    if (t.includes('neurone') || t.includes('cerveau') || t.includes('nerveux')) {
      replies.push("Le système nerveux est l'unité la plus fascinante du vivant. Tu commences à le voir.");
    }
    if (t.includes('drépano') || t.includes('drepano') || t.includes('sang')) {
      replies.push("Tu comprends la drépanocytose, donc tu comprendras des dizaines d'autres maladies de la même famille. Tu as un outil maintenant.");
    }

    // Si rien de spécifique détecté, message générique chaleureux
    if (replies.length === 0) {
      const generic = [
        "Merci pour ces mots. Ce que tu as écrit, je le lis comme un signe que la mission a fait son travail. Tu sors différent que tu y es entré.",
        "Tu prends le temps d'écrire ce que tu as appris. C'est rare. C'est précieux. Continue comme ça.",
        "Tes mots me confirment que Science Quest fait ce qu'elle doit faire : transformer le savoir en regard. Bravo.",
        "Je lis ton témoignage et je vois quelqu'un qui réfléchit, pas qui consomme. C'est exactement ce que je voulais."
      ];
      replies.push(generic[Math.floor(Math.random() * generic.length)]);
    }

    // Combine 1-2 phrases + signature philosophique
    const main = replies.slice(0, 2).join(' ');
    const closings = [
      "Et ce que tu as compris ici, personne ne pourra jamais te l'enlever.",
      "Continue de construire sur du roc, pas sur du sable.",
      "Tu n'apprends pas la science. Tu la deviens.",
      "Comprendre, ça se transmet. Maintenant, à ton tour."
    ];
    return main + ' ' + closings[Math.floor(Math.random() * closings.length)];
  };

  const handleAction = (mec) => {
    setSubmitted(s => ({ ...s, [mec.id]: true }));
    if (mec.id === 'temoignage' && testimonyText.trim().length > 0) {
      // Sauvegarder le témoignage dans le state
      if (setState) {
        setState(s => {
          const testimonies = { ...(s.testimonies || {}) };
          testimonies[missionId || 'unknown'] = {
            text: testimonyText.trim(),
            date: new Date().toISOString(),
            mission: missionTitle
          };
          return { ...s, testimonies, xp: (s.xp || 0) + 100 };
        });
      }
      // Réponse de Kotchami
      setKotchamiReply(generateKotchamiReply(testimonyText));
    }
    if (mec.id === 'invitation') {
      const url = window.location.href;
      const text = mec.shareText + url;
      if (navigator.share) {
        navigator.share({ title: 'Science Quest', text: text, url: url }).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => alert('Lien copié ! Colle-le dans WhatsApp.')).catch(() => {});
      }
    }
    if (mec.id === 'bug') {
      window.location.href = `mailto:${mec.contactEmail}?subject=${encodeURIComponent(mec.subject)}&body=${encodeURIComponent('Bonjour Kotchami,\n\n[Décris ici ton bug ou ta suggestion]\n\nMerci.')}`;
    }
  };

  return (
    <div className="anim-in card-border rounded-xl p-5 mb-6" style={{background: 'rgba(217, 119, 6, 0.04)'}}>
      <p className="text-center text-xs uppercase tracking-[0.3em] text-amber-400 font-bold mb-1">🎁 Récompenses Bonus</p>
      <p className="text-center text-slate-400 text-xs mb-5">Choisis un défi pour gagner plus</p>

      <div className="grid grid-cols-2 gap-2 mb-4">
        {mecaniques.map(mec => (
          <button
            key={mec.id}
            onClick={() => setActiveTab(activeTab === mec.id ? null : mec.id)}
            className="card-border rounded-lg p-3 text-left transition-all"
            style={{
              opacity: 1, visibility: 'visible',
              borderColor: activeTab === mec.id ? '#f59e0b' : '#334155',
              background: activeTab === mec.id ? 'rgba(245, 158, 11, 0.08)' : 'rgba(15, 23, 42, 0.4)'
            }}
          >
            <div className="text-xl mb-1">{mec.icon}</div>
            <p className="text-amber-100 font-bold text-xs leading-tight">{mec.titre}</p>
            <p className="text-amber-400/70 text-[10px] mt-1">{mec.reward}</p>
          </button>
        ))}
      </div>

      {activeTab && (() => {
        const mec = mecaniques.find(m => m.id === activeTab);
        const isSubmitted = submitted[mec.id];
        return (
          <div className="anim-in card-border rounded-lg p-4" style={{background: 'rgba(15, 23, 42, 0.6)'}}>
            <h3 className="font-display text-base text-amber-100 mb-2">{mec.icon} {mec.titre}</h3>
            <p className="text-slate-300 text-sm mb-4 leading-relaxed">{mec.description}</p>
            {mec.input && !isSubmitted && (
              <textarea
                placeholder={mec.placeholder}
                rows={4}
                value={testimonyText}
                onChange={(e) => setTestimonyText(e.target.value)}
                className="w-full mb-3 p-3 rounded-lg text-sm"
                style={{background: 'rgba(2, 6, 23, 0.6)', border: '1px solid #334155', color: '#fff'}}
              />
            )}
            {!isSubmitted ? (
              <button
                onClick={() => handleAction(mec)}
                disabled={mec.input && testimonyText.trim().length < 10}
                className="btn-primary px-5 py-2 rounded-full text-sm inline-flex items-center gap-2"
                style={{opacity: (mec.input && testimonyText.trim().length < 10) ? 0.4 : 1, visibility: 'visible', display: 'inline-flex'}}
              >
                {mec.action}
              </button>
            ) : (
              <p className="text-emerald-400 text-sm">✓ Action enregistrée. Récompense : {mec.reward}</p>
            )}
            {/* Réponse personnalisée de Kotchami au témoignage */}
            {mec.id === 'temoignage' && isSubmitted && kotchamiReply && (
              <div className="anim-in mt-4 rounded-xl p-4" style={{background: 'rgba(16, 185, 129, 0.08)', border: '1px solid rgba(16, 185, 129, 0.4)'}}>
                <div className="flex items-start gap-3">
                  <div className="shrink-0 w-9 h-9 rounded-full flex items-center justify-center font-bold text-white text-sm" style={{background: '#10b981'}}>K</div>
                  <div className="flex-1">
                    <p className="text-[10px] uppercase tracking-wider mb-1" style={{color: '#6ee7b7'}}>Dr Kotchami te répond</p>
                    <p className="text-slate-100 text-sm leading-relaxed italic">« {kotchamiReply} »</p>
                    <p className="text-[10px] text-slate-500 mt-2">— Le Passeur de sciences</p>
                  </div>
                </div>
              </div>
            )}
            {mec.id === 'bug' && (
              <p className="text-[11px] text-slate-500 mt-3">Contact direct : kotchamiogougbe@gmail.com</p>
            )}
          </div>
        );
      })()}
    </div>
  );
}

// APP

function App() {
  const [state, setState] = useGameState();
  // Si le profil est déjà sauvegardé (localStorage), on saute l'écran de bienvenue
  const [screen, setScreen] = useState(state.playerName ? 'home' : 'welcome');
  const [missionPhase, setMissionPhase] = useState('intro');
  const [nameInput, setNameInput] = useState('');
  const [countryInput, setCountryInput] = useState('');
  const [activeGenecodeMission, setActiveGenecodeMission] = useState(null);
  // PWA — installation et statut online
  const pwa = usePWAInstall();
  const online = useOnlineStatus();
  const [showInstallBanner, setShowInstallBanner] = React.useState(false);
  // Afficher la bannière d'installation après 30s de jeu (pas dès l'arrivée)
  React.useEffect(() => {
    if (!pwa.canInstall) return;
    const t = setTimeout(() => setShowInstallBanner(true), 30000);
    return () => clearTimeout(t);
  }, [pwa.canInstall]);
  // Mettre à jour la streak ET régénérer les vies au démarrage
  React.useEffect(() => {
    if (state.playerName) {
      setState(s => regenLives(updateStreak(s)));
      // Régénération continue toutes les minutes
      const intervalId = setInterval(() => {
        setState(s => regenLives(s));
      }, 60 * 1000);
      return () => clearInterval(intervalId);
    }
    // eslint-disable-next-line
  }, []);

  const [missionData, setMissionData] = useState({
    seenCharacters: new Set(),
    selectedChar: null,
    genotypes: {},
    pedigreeChecked: false,
    pedigreeErrors: [],
    phase2Answered: false, phase2Correct: null,
    phase3Answered: false, phase3Correct: null,
    phase5Answered: false, phase5Correct: null,
    punnettCells: {},
    missionXP: 0
  });

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [screen, missionPhase, activeGenecodeMission]);

  // Mood musical adaptatif selon l'écran principal
  React.useEffect(() => {
    if (screen === 'welcome') MusicEngine.setMood('onboarding');
    else if (screen === 'home') MusicEngine.setMood('navigation');
    else if (screen === 'contact' || screen === 'settings') MusicEngine.setMood('exploration');
    // Pour les écrans de mission, le mood est géré dans MissionPlayer / MissionFlow
  }, [screen]);

  const startMission = (missionId) => {
    // Si c'est une mission GENECODE ou NEUROLINK, route vers MissionPlayer
    if (missionId && typeof missionId === 'string' && (missionId.startsWith('gc-') || missionId.startsWith('nl-'))) {
      setActiveGenecodeMission(missionId);
      setScreen('genecode-mission');
      return;
    }
    // Sinon, ancienne logique pour la mission tutorielle drépanocytose
    setMissionPhase('intro');
    setMissionData({
      seenCharacters: new Set(), selectedChar: null, genotypes: {},
      pedigreeChecked: false, pedigreeErrors: [],
      phase2Answered: false, phase2Correct: null,
      phase3Answered: false, phase3Correct: null,
      phase5Answered: false, phase5Correct: null,
      punnettCells: {}, missionXP: 0
    });
    setState(s => ({ ...s, lives: 3 }));
    setScreen('mission');
  };

  // Chronomètre du tuto drépanocytose (actif quand mission en cours)
  const tutoElapsed = useMissionTimer(screen === 'mission' && missionPhase !== 'intro' && missionPhase !== 'epilogue');

  const completeMission = () => {
    SoundManager.play('complete');
    MusicEngine.pulse('progression');
    // Bonus rapidité si tuto complété en moins de 8 minutes
    const fastBonus = (tutoElapsed > 0 && tutoElapsed < 480) ? 50 : 0;
    const finalXP = missionData.missionXP + fastBonus;
    setState(s => {
      const updated = updateStreak({ ...s });
      const records = { ...(updated.missionRecords || {}) };
      const previous = records['drepanocytose'];
      if (tutoElapsed > 0 && (!previous || tutoElapsed < previous)) records['drepanocytose'] = tutoElapsed;
      const badges = [...new Set([...(updated.badges || []), 'mission:drepanocytose'])];
      if (fastBonus > 0 && !badges.includes('badge:eclair')) badges.push('badge:eclair');
      if ((updated.streakDays || 0) >= 7 && !badges.includes('badge:streak7')) badges.push('badge:streak7');
      // Mise à jour xpHistory pour le sparkline
      const today = new Date().toISOString().slice(0, 10);
      const xpHistory = [...(updated.xpHistory || [])];
      const todayEntry = xpHistory.find(e => e.date === today);
      if (todayEntry) todayEntry.xp += finalXP;
      else xpHistory.push({ date: today, xp: finalXP });
      const recent = xpHistory.slice(-30);
      return {
        ...updated,
        xp: s.xp + finalXP,
        completedMissions: [...new Set([...s.completedMissions, 'drepanocytose'])],
        grimoireEntries: [...new Set([...s.grimoireEntries, 'Hérédité autosomale récessive'])],
        missionRecords: records,
        badges,
        xpHistory: recent
      };
    });
    setScreen('home');
  };

  const exitGenecodeMission = () => {
    setActiveGenecodeMission(null);
    setScreen('home');
  };

  const loseLife = () => setState(s => ({ ...s, lives: Math.max(0, s.lives - 1) }));
  const addXP = (n) => setMissionData(d => ({ ...d, missionXP: d.missionXP + n }));

  return (
    <div className="min-h-screen w-full text-white relative overflow-x-hidden" style={{background: '#020617'}}>
      <div className="absolute inset-0 bg-grain pointer-events-none"></div>

      {/* Header global (sauf welcome) */}
      {screen !== 'welcome' && (
        <div className="relative z-20 border-b border-amber-500/10 sticky top-0" style={{background: 'rgba(2, 6, 23, 0.92)', backdropFilter: 'blur(10px)'}}>
          <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <button onClick={() => setScreen('home')} className="flex items-center gap-2 text-amber-400 hover:text-amber-300 transition-colors">
              <Icon name="dna" size={22} />
              <span className="font-display text-amber-100 text-base">Science Quest</span>
            </button>
            <div className="flex items-center gap-3 text-sm">
              {state.streakDays > 0 && (
                <div className="flex items-center gap-1 text-orange-400" title={`Série de ${state.streakDays} jour(s)`}>
                  <span className="text-base">🔥</span>
                  <span className="font-mono-sci tabular-nums text-xs">{state.streakDays}</span>
                </div>
              )}
              <div className="flex items-center gap-1.5 text-amber-400">
                <Icon name="sparkles" size={16} />
                <span className="font-mono-sci text-amber-300 tabular-nums text-xs md:text-sm">{state.xp + missionData.missionXP}</span>
              </div>
              <div className="flex items-center gap-0.5">
                {[0,1,2].map(i => (
                  <span key={i}><Icon name="heart" size={16} fill={i < state.lives ? '#ef4444' : 'none'} color={i < state.lives ? '#ef4444' : '#334155'} /></span>
                ))}
              </div>
              <button
                onClick={() => { setState(s => ({ ...s, soundsEnabled: !s.soundsEnabled })); SoundManager.play('click'); }}
                className="text-slate-400 hover:text-amber-400 transition-colors"
                title={state.soundsEnabled ? 'Désactiver les sons' : 'Activer les sons'}
              >
                {state.soundsEnabled ? '🔊' : '🔇'}
              </button>
              <button
                onClick={() => { setState(s => ({ ...s, musicEnabled: !s.musicEnabled })); SoundManager.play('click'); }}
                className="text-slate-400 hover:text-amber-400 transition-colors relative"
                title={state.musicEnabled ? 'Couper la musique' : 'Activer la musique adaptative'}
              >
                {state.musicEnabled ? '🎵' : '🎶'}
                {state.musicEnabled && (
                  <span className="absolute -top-0.5 -right-0.5 w-1.5 h-1.5 rounded-full bg-emerald-400" style={{animation: 'musicPulse 1.6s ease-in-out infinite'}}></span>
                )}

              <button onClick={() => setScreen('help')} className="text-slate-400 hover:text-amber-400 transition-colors" title="Aide & tutoriel">

        </div>

      <div className="relative z-10 max-w-4xl mx-auto px-5 py-8 md:py-12">

        {screen === 'welcome' && (

              }
            }} />

        {/* ========== HOME (Académie) ========== */}
        {screen === 'home' && (
          <HomeScreen
            state={state}

        {/* ========== CONTACT ========== */}
        {screen === 'contact' && (
          <ContactScreen onBack={() => setScreen('home')} />
        )}

        {/* ========== HELP ========== */}
        {screen === 'help' && (
          <HelpScreen state={state} setState={setState} onBack={() => setScreen('home')} />
        )}

        {/* ========== DAILY QUIZ ========== */}
        {screen === 'dailyquiz' && (
          <DailyQuizScreen state={state} setState={setState} onBack={() => setScreen('home')} />
        )}

        {/* ========== CHALLENGE MODE ========== */}
        {screen === 'challenge' && (
          <ChallengeScreen state={state} setState={setState} onBack={() => setScreen('home')} />
        )}

        {/* ========== SHARE ========== */}
        {screen === 'share' && (
          <ShareScreen state={state} onBack={() => setScreen('home')} />

        {/* ========== CERTIFICATE ========== */}
        {screen === 'certificate' && (
          <CertificateScreen state={state} themeName={state._currentThemeName || 'Thème complet'} onBack={() => setScreen('home')} />
        )}

        {/* ========== SETTINGS / PROFIL ========== */}
        {screen === 'settings' && (
          <SettingsScreen
            state={state}
            setState={setState}
            onBack={() => setScreen('home')}
            onShare={() => setScreen('share')}
            onCertificate={() => setScreen('certificate')}
          />
        )}

        {/* ========== MISSION ========== */}
        {screen === 'mission' && (
          <MissionFlow
            phase={missionPhase}
            setPhase={setMissionPhase}
            state={state}
            setState={setState}
            missionData={missionData}
            setMissionData={setMissionData}
            addXP={addXP}
            loseLife={loseLife}
            onComplete={completeMission}
            onExit={() => setScreen('home')}
            elapsedSeconds={tutoElapsed}
          />
        )}

        {/* ========== MISSIONS GENECODE (Arc 1 → BOSS, data-driven) ========== */}
        {screen === 'genecode-mission' && activeGenecodeMission && (
          <MissionPlayer
            missionId={activeGenecodeMission}
            state={state}
            setState={setState}
            onExit={exitGenecodeMission}

        )}
      </div>

      {/* ========== PWA — Bannière d'installation ========== */}
      {showInstallBanner && pwa.canInstall && (
        <InstallBanner
          onInstall={async () => {
            await pwa.promptInstall();
            setShowInstallBanner(false);
          }}
          onDismiss={() => { pwa.dismiss(); setShowInstallBanner(false); }}
        />
      )}

      {/* ========== PWA — Indicateur offline ========== */}
      <OfflineIndicator online={online} />
    </div>
  );
}
