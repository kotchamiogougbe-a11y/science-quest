function CharIcon({ sex, affected, size = 40, selected, error }) {
  let stroke = affected ? '#dc2626' : '#fbbf24';
  if (error) stroke = '#ef4444';
  if (selected) stroke = '#fde047';
  const fill = affected ? '#dc2626' : 'transparent';
  const sw = (selected || error) ? 3 : 2;
  if (sex === 'M') {
    return <svg width={size} height={size} viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" fill={fill} stroke={stroke} strokeWidth={sw} rx="1" /></svg>;
  }
  return <svg width={size} height={size} viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill={fill} stroke={stroke} strokeWidth={sw} /></svg>;
}

// ============================================================
// MISSION PLAYER — Moteur générique data-driven
// Joue n'importe quelle mission de MISSIONS_DATA via une seule interface
// Architecture : intro → prologue → briefing → phases[] → epilogue
// ============================================================

function MissionPlayer({ missionId, state, setState, onExit }) {
  const mission = MISSIONS_DATA[missionId];
  if (!mission) {
    return (
      <div className="text-center py-20">
        <p className="text-red-400">Mission introuvable : {missionId}</p>
        <button onClick={onExit} className="mt-6 btn-primary px-6 py-2 rounded-full">Retour à l'Académie</button>
      </div>
    );
  }

  const [step, setStep] = React.useState('intro'); // intro | prologue | briefing | phaseN | epilogue
  const [currentPhaseIdx, setCurrentPhaseIdx] = React.useState(0);
  const [missionXP, setMissionXP] = React.useState(0);
  const [phaseAnswered, setPhaseAnswered] = React.useState({});
  const [missionLives, setMissionLives] = React.useState(3);

  const totalPhases = mission.phases.length;

  // Navigation
  const allSteps = ['intro', 'prologue', 'briefing', ...mission.phases.map((_, i) => `phase${i}`), 'epilogue'];
  const currentStepIdx = allSteps.indexOf(step);
  const progress = (currentStepIdx / (allSteps.length - 1)) * 100;

  const goNext = () => {
    if (step === 'intro') setStep('prologue');
    else if (step === 'prologue') setStep('briefing');
    else if (step === 'briefing') { setCurrentPhaseIdx(0); setStep('phase0'); }
    else if (step.startsWith('phase')) {
      const idx = parseInt(step.replace('phase', ''));
      if (idx + 1 < totalPhases) { setCurrentPhaseIdx(idx + 1); setStep(`phase${idx + 1}`); }
      else setStep('epilogue');
    }
  };

  const goPrevious = () => {
    if (currentStepIdx > 0) setStep(allSteps[currentStepIdx - 1]);
  };

  const onPhaseCorrect = (xp) => {
    setMissionXP(x => x + xp);
    setPhaseAnswered(p => ({ ...p, [step]: { correct: true, xp } }));
  };

  const onPhaseWrong = () => {
    setMissionLives(l => Math.max(0, l - 1));
    setPhaseAnswered(p => ({ ...p, [step]: { correct: false, xp: 0 } }));
  };

  const completeMission = () => {
    setState(s => ({
      ...s,
      xp: s.xp + missionXP,
      completedMissions: [...new Set([...s.completedMissions, missionId])],
      grimoireEntries: [...new Set([...s.grimoireEntries, mission.epilogue.grimoire])],
      ibrahimFragments: mission.epilogue.fragmentIbrahim
        ? [...new Set([...(s.ibrahimFragments || []), mission.epilogue.fragmentIbrahim.numero])]
        : (s.ibrahimFragments || []),
      currentRank: Math.max(s.currentRank || 0, mission.rank.to)
    }));
    onExit();
  };

  const phaseLabel = (s) => {
    if (s === 'intro') return 'Intro';
    if (s === 'prologue') return 'Prologue';
    if (s === 'briefing') return 'Briefing';
    if (s === 'epilogue') return 'Épilogue';
    if (s.startsWith('phase')) {
      const i = parseInt(s.replace('phase', ''));
      return `Phase ${i + 1}/${totalPhases}`;
    }
    return s;
  };

  return (
    <div>
      {/* Barre de progression + retour */}
      {step !== 'intro' && step !== 'epilogue' && (
        <div className="mb-6 anim-in">
          <div className="flex items-center justify-between mb-2 gap-3">
            <button
              onClick={goPrevious}
              className="btn-ghost px-3 py-1.5 rounded-full text-xs inline-flex items-center gap-1.5 shrink-0"
              style={{opacity: 1, visibility: 'visible'}}
              title={`Retour à : ${phaseLabel(allSteps[currentStepIdx - 1])}`}
            >
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="m15 18-6-6 6-6"/>
              </svg>
              <span>Retour</span>
            </button>
            <p className="text-[10px] uppercase tracking-wider text-slate-500 text-center flex-1">
              Mission {mission.number} — {phaseLabel(step)}
            </p>
            <div className="text-xs text-amber-400 font-mono-sci tabular-nums shrink-0" style={{minWidth: '70px', textAlign: 'right'}}>
              +{missionXP} XP
            </div>
          </div>
          <div className="progress-bar"><div className="progress-bar-fill" style={{width: `${progress}%`}}></div></div>
        </div>
      )}

      {/* Contenus selon l'étape */}
      {step === 'intro' && <MissionIntroV2 mission={mission} onStart={goNext} onBack={onExit} />}
      {step === 'prologue' && <MissionPrologue mission={mission} onNext={goNext} />}
      {step === 'briefing' && <MissionBriefing mission={mission} onNext={goNext} />}
      {step.startsWith('phase') && (
        <MissionPhaseQuestion
          phase={mission.phases[currentPhaseIdx]}
          phaseIdx={currentPhaseIdx}
          totalPhases={totalPhases}
          answered={phaseAnswered[step]}
          onCorrect={onPhaseCorrect}
          onWrong={onPhaseWrong}
          onNext={goNext}
          missionLives={missionLives}
        />
      )}
      {step === 'epilogue' && (
        <MissionEpilogue
          mission={mission}
          missionXP={missionXP}
          state={state}
          onComplete={completeMission}
        />
      )}
    </div>
  );
}

// ============================================================
// PHASE QUESTION — Composant générique
// Affiche bonne réponse et explication même quand on se trompe (philosophie Kotchami)
// ============================================================
function MissionPhaseQuestion({ phase, phaseIdx, totalPhases, answered, onCorrect, onWrong, onNext, missionLives }) {
  const [selectedIdx, setSelectedIdx] = React.useState(null);
  const [submitted, setSubmitted] = React.useState(false);

  // Reset à chaque phase
  React.useEffect(() => {
    setSelectedIdx(null);
    setSubmitted(false);
  }, [phaseIdx]);

  const handleSubmit = () => {
    if (selectedIdx === null) return;
    setSubmitted(true);
    if (selectedIdx === phase.correctIdx) onCorrect(phase.xp);
    else onWrong();
  };

  const isCorrect = selectedIdx === phase.correctIdx;

  return (
    <div className="max-w-2xl mx-auto">
      <div className="anim-in inline-flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-amber-400/70 mb-4">
        <span>🧪</span> <span>{phase.title}</span>
      </div>
      <h2 className="anim-in delay-100 font-display text-xl md:text-2xl mb-8 text-amber-100 leading-snug">
        {phase.question}
      </h2>

      <div className="space-y-3 mb-8">
        {phase.options.map((opt, i) => {
          const isSelected = selectedIdx === i;
          const isCorrectAnswer = i === phase.correctIdx;
          let extraClasses = "";
          let extraStyle = {};
          if (submitted) {
            if (isCorrectAnswer) {
              extraStyle = { borderColor: '#10b981', background: 'rgba(16,185,129,0.08)' };
            } else if (isSelected) {
              extraStyle = { borderColor: '#ef4444', background: 'rgba(239,68,68,0.08)' };
            }
          } else if (isSelected) {
            extraStyle = { borderColor: '#f59e0b', background: 'rgba(245,158,11,0.08)' };
          }
          return (
            <button
              key={i}
              onClick={() => !submitted && setSelectedIdx(i)}
              disabled={submitted}
              className={`anim-in delay-${(i+2)*100} w-full text-left p-4 rounded-lg border-2 transition-all ${submitted ? 'cursor-default' : 'cursor-pointer hover:border-amber-500/50'}`}
              style={{
                borderColor: '#334155',
                background: 'rgba(15, 23, 42, 0.4)',
                opacity: 1,
                ...extraStyle
              }}
            >
              <div className="flex items-start gap-3">
                <span className={`shrink-0 w-7 h-7 rounded-full flex items-center justify-center font-mono-sci text-sm border-2 ${submitted && isCorrectAnswer ? 'border-emerald-400 text-emerald-400' : submitted && isSelected ? 'border-red-400 text-red-400' : isSelected ? 'border-amber-400 text-amber-400' : 'border-slate-600 text-slate-500'}`}>
                  {String.fromCharCode(65 + i)}
                </span>
                <span className="text-slate-200 text-sm md:text-base flex-1">{opt}</span>
                {submitted && isCorrectAnswer && <span className="text-emerald-400 text-lg">✓</span>}
                {submitted && isSelected && !isCorrectAnswer && <span className="text-red-400 text-lg">✗</span>}
              </div>
            </button>
          );
        })}
      </div>

      {!submitted && (
        <div className="text-center">
          <button
            onClick={handleSubmit}
            disabled={selectedIdx === null}
            className="btn-primary px-8 py-3 rounded-full inline-flex items-center gap-2 disabled:opacity-40 disabled:cursor-not-allowed"
            style={{opacity: selectedIdx !== null ? 1 : 0.4, visibility: 'visible', display: 'inline-flex'}}
          >
            Valider ma réponse
          </button>
        </div>
      )}

      {submitted && (
        <div className="anim-in card-border rounded-xl p-5 mb-6" style={{background: isCorrect ? 'rgba(16,185,129,0.05)' : 'rgba(245,158,11,0.05)', borderColor: isCorrect ? '#10b981' : '#f59e0b'}}>
          <div className="flex items-start gap-3">
            <span className="text-2xl shrink-0">{isCorrect ? '✓' : '💡'}</span>
            <div className="flex-1">
              <p className="font-display text-base mb-2" style={{color: isCorrect ? '#10b981' : '#f59e0b'}}>
                {isCorrect ? `Excellent ! +${phase.xp} XP` : 'Pas tout à fait — voici l\'explication :'}
              </p>
              <p className="text-slate-300 text-sm leading-relaxed">{phase.explain}</p>
            </div>
          </div>
        </div>
      )}

      {submitted && (
        <div className="text-center">
          <button
            onClick={onNext}
            className="btn-primary px-8 py-3 rounded-full inline-flex items-center gap-2"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}
          >
            {phaseIdx + 1 < totalPhases ? 'Phase suivante →' : 'Voir l\'épilogue →'}
          </button>
        </div>
      )}
    </div>
  );
}

      shareText: `Je viens de terminer "${missionTitle}" sur Science Quest 🧬 — la plateforme éducative du Niger qui transforme la science en aventure. Rejoins-moi : `
    },
    {
      id: 'bug',
      icon: '🐛',
      titre: 'Améliore Science Quest',
      sousTitre: 'Gagne 50 XP bonus',
      description: "Tu as remarqué un bug, une coquille, ou tu as une suggestion ? Signale-le directement à Kotchami par e-mail et gagne 50 XP.",
      action: "Envoyer un signalement",
      contactEmail: 'kotchamiogougbe@gmail.com',
      subject: `[Science Quest] Suggestion / Bug - Mission "${missionTitle}"`,
      reward: '+ 50 XP'
    }
  ];

  const handleAction = (mec) => {
    setSubmitted(s => ({ ...s, [mec.id]: true }));
    if (mec.id === 'invitation') {
      const url = window.location.href;
      const text = mec.shareText + url;
      if (navigator.share) {
        navigator.share({ title: 'Science Quest', text: text, url: url }).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(text).then(() => alert('Lien copié ! Colle-le dans WhatsApp.')).catch(() => {});
      }
    }
    if (mec.id === 'bug') {
      window.location.href = `mailto:${mec.contactEmail}?subject=${encodeURIComponent(mec.subject)}&body=${encodeURIComponent('Bonjour Kotchami,\n\n[Décris ici ton bug ou ta suggestion]\n\nMerci.')}`;
    }
  };

  return (
    <div className="anim-in card-border rounded-xl p-5 mb-6" style={{background: 'rgba(217, 119, 6, 0.04)'}}>
      <p className="text-center text-xs uppercase tracking-[0.3em] text-amber-400 font-bold mb-1">🎁 Récompenses Bonus</p>
      <p className="text-center text-slate-400 text-xs mb-5">Choisis un défi pour gagner plus</p>

      <div className="grid grid-cols-2 gap-2 mb-4">
        {mecaniques.map(mec => (
          <button
            key={mec.id}
            onClick={() => setActiveTab(activeTab === mec.id ? null : mec.id)}
            className="card-border rounded-lg p-3 text-left transition-all"
            style={{
              opacity: 1, visibility: 'visible',
              borderColor: activeTab === mec.id ? '#f59e0b' : '#334155',
              background: activeTab === mec.id ? 'rgba(245, 158, 11, 0.08)' : 'rgba(15, 23, 42, 0.4)'
            }}
          >
            <div className="text-xl mb-1">{mec.icon}</div>
            <p className="text-amber-100 font-bold text-xs leading-tight">{mec.titre}</p>
            <p className="text-amber-400/70 text-[10px] mt-1">{mec.reward}</p>
          </button>
        ))}
      </div>

      {activeTab && (() => {
        const mec = mecaniques.find(m => m.id === activeTab);
        const isSubmitted = submitted[mec.id];
        return (
          <div className="anim-in card-border rounded-lg p-4" style={{background: 'rgba(15, 23, 42, 0.6)'}}>
            <h3 className="font-display text-base text-amber-100 mb-2">{mec.icon} {mec.titre}</h3>
            <p className="text-slate-300 text-sm mb-4 leading-relaxed">{mec.description}</p>
            {mec.input && !isSubmitted && (
              <textarea
                placeholder={mec.placeholder}
                rows={3}
                className="w-full mb-3 p-3 rounded-lg text-sm"
                style={{background: 'rgba(2, 6, 23, 0.6)', border: '1px solid #334155', color: '#fff'}}
              />
            )}
            {!isSubmitted ? (
              <button
                onClick={() => handleAction(mec)}
                className="btn-primary px-5 py-2 rounded-full text-sm inline-flex items-center gap-2"
                style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}
              >
                {mec.action}
              </button>
            ) : (
              <p className="text-emerald-400 text-sm">✓ Action enregistrée. Récompense : {mec.reward}</p>
            )}
            {mec.id === 'bug' && (
              <p className="text-[11px] text-slate-500 mt-3">Contact direct : kotchamiogougbe@gmail.com</p>
            )}
          </div>
        );
      })()}
    </div>
  );
}

function App() {
  const [screen, setScreen] = useState('welcome');
  const [missionPhase, setMissionPhase] = useState('intro');
  const [state, setState] = useGameState();
  const [nameInput, setNameInput] = useState('');
  const [countryInput, setCountryInput] = useState('');
  const [activeGenecodeMission, setActiveGenecodeMission] = useState(null);

  const [missionData, setMissionData] = useState({
    seenCharacters: new Set(),
    selectedChar: null,
    genotypes: {},
    pedigreeChecked: false,
    pedigreeErrors: [],
    phase2Answered: false, phase2Correct: null,
    phase3Answered: false, phase3Correct: null,
    phase5Answered: false, phase5Correct: null,
    punnettCells: {},
    missionXP: 0
  });

  useEffect(() => { window.scrollTo({ top: 0, behavior: 'smooth' }); }, [screen, missionPhase, activeGenecodeMission]);

  const startMission = (missionId) => {
    // Si c'est une mission GENECODE, route vers MissionPlayer
    if (missionId && typeof missionId === 'string' && missionId.startsWith('gc-')) {
      setActiveGenecodeMission(missionId);
      setScreen('genecode-mission');
      return;
    }
    // Sinon, ancienne logique pour la mission tutorielle drépanocytose
    setMissionPhase('intro');
    setMissionData({
      seenCharacters: new Set(), selectedChar: null, genotypes: {},
      pedigreeChecked: false, pedigreeErrors: [],
      phase2Answered: false, phase2Correct: null,
      phase3Answered: false, phase3Correct: null,
      phase5Answered: false, phase5Correct: null,
      punnettCells: {}, missionXP: 0
    });
    setState(s => ({ ...s, lives: 3 }));
    setScreen('mission');
  };

  const completeMission = () => {
    setState(s => ({
      ...s,
      xp: s.xp + missionData.missionXP,
      completedMissions: [...new Set([...s.completedMissions, 'drepanocytose'])],
      grimoireEntries: [...new Set([...s.grimoireEntries, 'Hérédité autosomale récessive'])]
    }));
    setScreen('home');
  };

  const exitGenecodeMission = () => {
    setActiveGenecodeMission(null);
    setScreen('home');
  };

  const loseLife = () => setState(s => ({ ...s, lives: Math.max(0, s.lives - 1) }));
  const addXP = (n) => setMissionData(d => ({ ...d, missionXP: d.missionXP + n }));

  return (
    <div className="min-h-screen w-full text-white relative overflow-x-hidden" style={{background: '#020617'}}>
      <div className="absolute inset-0 bg-grain pointer-events-none"></div>

      {/* Header global (sauf welcome) */}
      {screen !== 'welcome' && (
        <div className="relative z-20 border-b border-amber-500/10 sticky top-0" style={{background: 'rgba(2, 6, 23, 0.92)', backdropFilter: 'blur(10px)'}}>
          <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
            <button onClick={() => setScreen('home')} className="flex items-center gap-2 text-amber-400 hover:text-amber-300 transition-colors">
              <Icon name="dna" size={22} />
              <span className="font-display text-amber-100 text-base">Science Quest</span>
            </button>
            <div className="flex items-center gap-3 text-sm">
              <div className="flex items-center gap-1.5 text-amber-400">
                <Icon name="sparkles" size={16} />
                <span className="font-mono-sci text-amber-300 tabular-nums text-xs md:text-sm">{state.xp + missionData.missionXP}</span>
              </div>
              <div className="flex items-center gap-0.5">
                {[0,1,2].map(i => (
                  <span key={i}><Icon name="heart" size={16} fill={i < state.lives ? '#ef4444' : 'none'} color={i < state.lives ? '#ef4444' : '#334155'} /></span>
                ))}
              </div>
              <button onClick={() => setScreen('contact')} className="text-slate-400 hover:text-amber-400 transition-colors" title="Contact">
                <Icon name="info" size={18} />
              </button>
            </div>
          </div>
        </div>
      )}

      <div className="relative z-10 max-w-4xl mx-auto px-5 py-8 md:py-12">

        {/* ========== WELCOME ========== */}
        {screen === 'welcome' && (
          <WelcomeScreen
            nameInput={nameInput} setNameInput={setNameInput}
            countryInput={countryInput} setCountryInput={setCountryInput}
            onStart={() => {
              if (nameInput.trim()) {
                setState(s => ({ ...s, playerName: nameInput.trim(), country: countryInput.trim() }));
                setScreen('home');
              }
            }} />
        )}

        {/* ========== HOME (Académie) ========== */}
        {screen === 'home' && (
          <HomeScreen
            state={state}
            onStartMission={startMission}
            onContact={() => setScreen('contact')}
          />
        )}

        {/* ========== CONTACT ========== */}
        {screen === 'contact' && (
          <ContactScreen onBack={() => setScreen('home')} />
        )}

        {/* ========== MISSION ========== */}
        {screen === 'mission' && (
          <MissionFlow
            phase={missionPhase}
            setPhase={setMissionPhase}
            state={state}
            missionData={missionData}
            setMissionData={setMissionData}
            addXP={addXP}
            loseLife={loseLife}
            onComplete={completeMission}
          />
        )}

        {/* ========== MISSIONS GENECODE (Arc 1 → BOSS, data-driven) ========== */}
        {screen === 'genecode-mission' && activeGenecodeMission && (
          <MissionPlayer
            missionId={activeGenecodeMission}
            state={state}
            setState={setState}
            onExit={exitGenecodeMission}
          />
        )}
      </div>
    </div>
  );
}

function SubjectCard({ subject, onStartMission, completedMissions, delay }) {
  const [expanded, setExpanded] = useState(false);
  const allChapters = subject.parts.flatMap(p => p.themes.flatMap(t => t.chapters));
  const unlocked = allChapters.filter(c => !c.locked).length;
  const total = allChapters.length;
  return (
    <div className="anim-in" style={{animationDelay: `${delay}s`}}>
      <button onClick={() => setExpanded(!expanded)} className="w-full card-border rounded-2xl p-5 text-left hover:border-amber-400/40 transition-all">
        <div className="flex items-center gap-4">
          <div className="w-12 h-12 rounded-xl flex items-center justify-center shrink-0" style={{background: `${subject.color}22`, border: `1px solid ${subject.color}44`, color: subject.color}}>
            <Icon name={subject.icon} size={22} />
          </div>
          <div className="flex-1 min-w-0">
            <h3 className="font-display text-xl text-amber-100 mb-0.5">{subject.name}</h3>
            <p className="text-xs text-slate-400">{subject.description}</p>
            {subject.role && (
              <p className="text-[11px] mt-1 font-semibold" style={{color: subject.color}}>
                Rôle : {subject.role}
              </p>
            )}
          </div>
          <div className="text-right shrink-0">
            <p className="font-mono-sci text-amber-300 text-sm">{unlocked}/{total}</p>
            <Icon name="chevron" size={16} color="#fbbf24" />
          </div>
        </div>
      </button>

      {expanded && (
        <div className="mt-3 ml-4 space-y-2 anim-in">
          {subject.parts.map(part => (
            <div key={part.id}>
              <p className="text-[10px] uppercase tracking-wider text-slate-500 mt-3 mb-2">{part.name}</p>
              {part.themes.map(theme => (
                <div key={theme.id} className="mb-3">
                  <p className="text-xs text-amber-200/80 font-semibold mb-1.5 pl-3 border-l-2 border-amber-500/30">{theme.name}</p>
                  {theme.chapters.map(chap => {
                    const isCompleted = completedMissions.includes(chap.id);
                    return (
                      <button
                        key={chap.id}
                        onClick={() => { if (!chap.locked) onStartMission(chap.id); }}
                        disabled={chap.locked}
                        className={`w-full text-left p-3 rounded-xl mb-1.5 flex items-center gap-3 transition-all ${chap.locked ? 'mission-locked bg-slate-900/40 border border-slate-800 cursor-not-allowed' : 'card-border hover:border-amber-400/60'}`}
                      >
                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center shrink-0 ${chap.locked ? 'bg-slate-800' : isCompleted ? 'bg-emerald-500/20' : 'bg-amber-500/15'}`}>
                          <Icon name={chap.locked ? 'lock' : isCompleted ? 'check' : 'play'} size={14} color={chap.locked ? '#64748b' : isCompleted ? '#10b981' : '#fbbf24'} fill={!chap.locked && !isCompleted ? '#fbbf24' : 'none'} />
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-sm text-amber-100 truncate">{chap.name}</p>
                          <p className="text-[11px] text-slate-500 truncate">« {chap.power} »</p>
                        </div>
                      </button>
                    );
                  })}
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// MISSION FLOW
// ============================================================
function MissionFlow({ phase, setPhase, state, missionData, setMissionData, addXP, loseLife, onComplete }) {
  const phases = ['intro', 'prologue', 'briefing', 'p1', 'p2', 'p3', 'p4', 'p5', 'epilogue'];
  const currentIdx = phases.indexOf(phase);
  const progress = ((currentIdx) / (phases.length - 1)) * 100;

  const goPrevious = () => {
    if (currentIdx > 0) setPhase(phases[currentIdx - 1]);
  };

  const phaseLabels = {
    intro: 'Intro', prologue: 'Prologue', briefing: 'Briefing',
    p1: 'Enquête', p2: 'Analyse 1', p3: 'Analyse 2',
    p4: 'Pedigree', p5: 'Calcul', epilogue: 'Épilogue'
  };

  return (
    <div>
      {phase !== 'intro' && phase !== 'epilogue' && (
        <div className="mb-8 anim-in">
          <div className="flex items-center justify-between mb-2 gap-3">
            <button
              onClick={goPrevious}
              className="btn-ghost px-3 py-1.5 rounded-full text-xs inline-flex items-center gap-1.5 shrink-0"
              style={{opacity: 1, visibility: 'visible'}}
              title={`Retour à : ${phaseLabels[phases[currentIdx - 1]]}`}
            >
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{display: 'inline-block', verticalAlign: 'middle'}}>
                <path d="m15 18-6-6 6-6"/>
              </svg>
              <span>Retour</span>
            </button>
            <p className="text-[10px] uppercase tracking-wider text-slate-500 text-center flex-1">Phase {currentIdx} / {phases.length - 2} — {phaseLabels[phase]}</p>
            <div style={{width: '70px'}}></div>
          </div>
          <div className="progress-bar"><div className="progress-bar-fill" style={{width: `${progress}%`}}></div></div>
        </div>
      )}

      {phase === 'intro' && <MissionIntro onStart={() => setPhase('prologue')} />}
      {phase === 'prologue' && <Prologue onNext={() => setPhase('briefing')} />}
      {phase === 'briefing' && <Briefing onNext={() => setPhase('p1')} />}

      {phase === 'p1' && <Phase1Investigation
        seen={missionData.seenCharacters}
        selected={missionData.selectedChar}
        onSelect={(c) => setMissionData(d => ({...d, selectedChar: c, seenCharacters: new Set([...d.seenCharacters, c.id])}))}
        onNext={() => setPhase('p2')} />}

      {phase === 'p2' && <QuestionPhase
        title={T('phase2Title')} question={T('phase2Q')}
        options={[T('phase2A'), T('phase2B'), T('phase2C')]} correctIdx={1}
        explain={T('phase2Explain')}
        onCorrect={() => addXP(100)} onWrong={loseLife}
        onNext={() => setPhase('p3')} />}

      {phase === 'p3' && <QuestionPhase
        title={T('phase3Title')} question={T('phase3Q')}
        options={[T('phase3A'), T('phase3B'), T('phase3C')]} correctIdx={1}
        explain={T('phase3Explain')}
        onCorrect={() => addXP(100)} onWrong={loseLife}
        onNext={() => setPhase('p4')} />}

      {phase === 'p4' && <Phase4Pedigree
        data={missionData} setData={setMissionData}
        onCorrect={() => addXP(150)} onWrong={loseLife}
        onNext={() => setPhase('p5')} />}

      {phase === 'p5' && <Phase5Punnett
        data={missionData} setData={setMissionData}
        onCorrect={() => addXP(150)} onWrong={loseLife}
        onNext={() => setPhase('epilogue')} />}

      {phase === 'epilogue' && <Epilogue xp={missionData.missionXP} onComplete={onComplete} />}
    </div>
  );
}

// ============================================================
// QUESTION PHASE (avec révélation pédagogique)
// ============================================================
function QuestionPhase({ title, question, options, correctIdx, explain, onCorrect, onWrong, onNext }) {
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [wasCorrect, setWasCorrect] = useState(false);

  const submit = () => {
    if (selected === null) return;
    const correct = selected === correctIdx;
    setWasCorrect(correct);
    setAnswered(true);
    if (correct) onCorrect(); else onWrong();
  };

  return (
    <div className="max-w-2xl mx-auto">
      <div className="anim-in text-center mb-6">
        <p className="inline-flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-amber-400/60 mb-3"><Icon name="target" size={14} /> Analyse</p>
        <h2 className="font-display text-2xl md:text-3xl">{title}</h2>
      </div>

      <div className="anim-in delay-100 card-border rounded-2xl p-5 mb-5">
        <p className="text-slate-100 text-base md:text-lg leading-relaxed">{question}</p>
      </div>

      <div className="space-y-2.5 mb-5">
        {options.map((opt, idx) => {
          const isSel = selected === idx;
          const showCorrect = answered && idx === correctIdx;
          const showWrong = answered && isSel && idx !== correctIdx;
          let cls = 'border-slate-700 bg-slate-900/40 text-slate-200';
          if (showCorrect) cls = 'border-emerald-400 bg-emerald-500/10 text-emerald-100';
          else if (showWrong) cls = 'border-red-500 bg-red-500/10 text-red-100';
          else if (isSel) cls = 'border-amber-400 bg-amber-500/10 text-amber-100';
          return (
            <button key={idx} onClick={() => !answered && setSelected(idx)} disabled={answered}
              className={`anim-in w-full text-left p-4 rounded-xl border transition-all ${cls}`}
              style={{animationDelay: `${0.15 + idx * 0.06}s`}}>
              <div className="flex items-start gap-3">
                <div className={`w-7 h-7 rounded-full border-2 flex items-center justify-center shrink-0 mt-0.5 text-xs font-bold ${
                  showCorrect ? 'border-emerald-400 bg-emerald-400 text-slate-950' :
                  showWrong ? 'border-red-500 bg-red-500 text-white' :
                  isSel ? 'border-amber-400 bg-amber-400 text-slate-950' : 'border-slate-600 text-slate-500'
                }`}>
                  {showCorrect ? <Icon name="check" size={14} /> : showWrong ? <Icon name="x" size={14} /> : String.fromCharCode(65 + idx)}
                </div>
                <span className="text-sm md:text-base leading-relaxed">{opt}</span>
              </div>
            </button>
          );
        })}
      </div>

      {answered && (
        <div className={`card-border rounded-2xl p-5 mb-5 anim-in`} style={{borderColor: wasCorrect ? 'rgba(16,185,129,0.4)' : 'rgba(239,68,68,0.4)', background: wasCorrect ? 'rgba(16,185,129,0.05)' : 'rgba(239,68,68,0.05)'}}>
          <div className="flex items-start gap-3">
            <span className={wasCorrect ? 'text-emerald-400' : 'text-red-400'}><Icon name={wasCorrect ? 'check' : 'alert'} size={20} /></span>
            <div>
              <p className={`text-xs uppercase tracking-wider font-bold mb-2 ${wasCorrect ? 'text-emerald-400' : 'text-red-400'}`}>
                {wasCorrect ? T('correct') + ' • +100 XP' : T('wrong') + ' • la bonne réponse est la B'}
              </p>
              <p className="text-sm text-slate-200 leading-relaxed">{explain}</p>
            </div>
          </div>
        </div>
      )}

      <div className="flex justify-center" style={{marginTop: '1.5rem', marginBottom: '1.5rem'}}>
        {!answered ? (
          <button onClick={submit} disabled={selected === null}
            className={`px-8 py-3.5 rounded-full inline-flex items-center gap-3 ${selected === null ? 'bg-slate-800 text-slate-500' : 'btn-primary'}`}
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('confirm')} <Icon name="check" size={16} />
          </button>
        ) : (
          <button onClick={onNext} className="btn-primary px-8 py-3.5 rounded-full inline-flex items-center gap-3"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('continue')} <Icon name="arrow" size={16} />
          </button>
        )}
      </div>
    </div>
  );
}

// ============================================================
// PHASE 4 — Pedigree
// ============================================================
function Phase4Pedigree({ data, setData, onCorrect, onWrong, onNext }) {
  const gen1 = FAMILY.filter(f => f.gen === 1);
  const gen2 = FAMILY.filter(f => f.gen === 2);
  const gen3 = FAMILY.filter(f => f.gen === 3);

  const check = () => {
    const errors = [];
    FAMILY.forEach(c => {
      const v = data.genotypes[c.id];
      if (!v) errors.push(c.id);
      else if (c.expected === 'AAorAS' && !['AA','AS'].includes(v)) errors.push(c.id);
      else if (c.expected === 'AS' && v !== 'AS') errors.push(c.id);
      else if (c.expected === 'SS' && v !== 'SS') errors.push(c.id);
    });
    setData(d => ({...d, pedigreeChecked: true, pedigreeErrors: errors}));
    if (errors.length === 0) onCorrect(); else onWrong();
  };

  const renderRow = (members) => (
    <div className="flex justify-around items-end flex-wrap gap-3">
      {members.map(m => (
        <div key={m.id} className="flex flex-col items-center">
          <div onClick={() => setData(d => ({...d, selectedChar: m}))} style={{cursor: 'pointer', transform: data.selectedChar?.id === m.id ? 'scale(1.1)' : 'scale(1)', transition: 'transform 0.2s'}}>
            <CharIcon sex={m.sex} affected={m.affected} size={50}
              selected={data.selectedChar?.id === m.id}
              error={data.pedigreeChecked && data.pedigreeErrors.includes(m.id)} />
          </div>
          {data.genotypes[m.id] && (
            <p className="text-center text-xs font-mono-sci font-bold mt-1" style={{color: data.pedigreeChecked && data.pedigreeErrors.includes(m.id) ? '#fca5a5' : '#fde68a'}}>
              {data.genotypes[m.id]}
            </p>
          )}
          <p className="text-[10px] text-slate-400 mt-0.5 text-center max-w-[80px] leading-tight">{m.name}</p>
        </div>
      ))}
    </div>
  );

  return (
    <div>
      <div className="anim-in text-center mb-6">
        <p className="inline-flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-amber-400/60 mb-3"><Icon name="dna" size={14} /> {T('phase4Title')}</p>
        <p className="text-slate-400 max-w-2xl mx-auto text-sm">{T('phase4Intro')}</p>
      </div>

      <div className="card-border rounded-2xl p-5 md:p-7 mb-5 anim-in delay-100">
        <div className="space-y-6">
          <div><p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 mb-2 text-center">Génération I</p>{renderRow(gen1)}</div>
          <div className="flex justify-center"><div className="h-px w-16 bg-amber-500/20"></div></div>
          <div><p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 mb-2 text-center">Génération II</p>{renderRow(gen2)}</div>
          <div className="flex justify-center"><div className="h-px w-16 bg-amber-500/20"></div></div>
          <div><p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 mb-2 text-center">Génération III</p>{renderRow(gen3)}</div>
        </div>
      </div>

      {data.selectedChar && (
        <div className="card-border rounded-2xl p-5 mb-5 anim-in">
          <div className="flex items-center gap-3 mb-3">
            <CharIcon sex={data.selectedChar.sex} affected={data.selectedChar.affected} size={40} />
            <div>
              <p className="font-display text-lg text-amber-100">{data.selectedChar.name}</p>
              <p className="text-xs text-slate-400">{data.selectedChar.role}</p>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-2">
            {[{v: 'AA', l: 'sain'}, {v: 'AS', l: 'porteur'}, {v: 'SS', l: 'malade'}].map(opt => {
              const sel = data.genotypes[data.selectedChar.id] === opt.v;
              return (
                <button key={opt.v} onClick={() => setData(d => ({...d, genotypes: {...d.genotypes, [data.selectedChar.id]: opt.v}}))}
                  className={`px-3 py-2.5 rounded-lg text-sm border transition-all ${sel ? 'border-amber-400 bg-amber-500/20 text-amber-100' : 'border-slate-700 bg-slate-900/50 text-slate-300'}`}>
                  <span className="font-mono-sci font-bold mr-1.5">{opt.v}</span>
                  <span className="text-xs opacity-70">{opt.l}</span>
                </button>
              );
            })}
          </div>
          {data.selectedChar.expected === 'AAorAS' && (
            <p className="text-xs text-slate-500 mt-2 italic">Indice : génotype non déterminable avec certitude. AA ou AS seront acceptés.</p>
          )}
        </div>
      )}

      {data.pedigreeChecked && data.pedigreeErrors.length === 0 && (
        <div className="card-border rounded-xl p-4 mb-5 anim-in" style={{borderColor: 'rgba(16,185,129,0.4)', background: 'rgba(16,185,129,0.05)'}}>
          <div className="flex items-center gap-3">
            <span className="text-emerald-400"><Icon name="check" size={20} /></span>
            <p className="text-sm text-emerald-200">{T('phase4Success')} • +150 XP</p>
          </div>
        </div>
      )}
      {data.pedigreeChecked && data.pedigreeErrors.length > 0 && (
        <div className="card-border rounded-xl p-4 mb-5 anim-in" style={{borderColor: 'rgba(239,68,68,0.4)', background: 'rgba(239,68,68,0.05)'}}>
          <div className="flex items-start gap-3">
            <span className="text-red-400 mt-0.5"><Icon name="x" size={18} /></span>
            <p className="text-sm text-red-200">{T('phase4Error')}</p>
          </div>
        </div>
      )}

      <div className="flex justify-center gap-3" style={{marginTop: '1.5rem', marginBottom: '1.5rem'}}>
        {!data.pedigreeChecked || data.pedigreeErrors.length > 0 ? (
          <button onClick={check} disabled={Object.keys(data.genotypes).length < FAMILY.length}
            className={`px-8 py-3.5 rounded-full inline-flex items-center gap-3 ${Object.keys(data.genotypes).length < FAMILY.length ? 'bg-slate-800 text-slate-500' : 'btn-primary'}`}
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('phase4Check')} <Icon name="check" size={16} />
          </button>
        ) : (
          <button onClick={onNext} className="btn-primary px-8 py-3.5 rounded-full inline-flex items-center gap-3"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('continue')} <Icon name="arrow" size={16} />
          </button>
        )}
      </div>
    </div>
  );
}

// ============================================================
// PHASE 5 — Punnett
// ============================================================
function Phase5Punnett({ data, setData, onCorrect, onWrong, onNext }) {
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [wasCorrect, setWasCorrect] = useState(false);

  const submit = () => {
    if (selected === null) return;
    const c = selected === 0;
    setWasCorrect(c); setAnswered(true);
    if (c) onCorrect(); else onWrong();
  };

  return (
    <div className="max-w-2xl mx-auto">
      <div className="anim-in text-center mb-6">
        <p className="inline-flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-amber-400/60 mb-3"><Icon name="dna" size={14} /> {T('phase5Title')}</p>
        <p className="text-slate-400 max-w-xl mx-auto text-sm">{T('phase5Intro')}</p>
      </div>

      <div className="anim-in delay-100 card-border rounded-2xl p-5 mb-5">
        <p className="text-xs uppercase tracking-wider text-amber-400/80 font-bold mb-4 text-center">Échiquier AS × AS</p>
        <div className="max-w-xs mx-auto">
          <div className="grid grid-cols-3 gap-2 mb-2">
            <div></div>
            <div className="text-center font-display font-bold text-amber-300 text-xl">A</div>
            <div className="text-center font-display font-bold text-red-400 text-xl">S</div>
          </div>
          {[0,1].map(row => (
            <div key={row} className="grid grid-cols-3 gap-2 mb-2">
              <div className="text-center font-display font-bold text-xl" style={{color: row === 0 ? '#fcd34d' : '#f87171'}}>{row === 0 ? 'A' : 'S'}</div>
              {[0,1].map(col => {
                const k = `${row},${col}`;
                const v = data.punnettCells[k];
                let bg = 'bg-slate-900/50 border-slate-700';
                if (v === 'SS') bg = 'bg-red-500/20 border-red-500/50';
                else if (v === 'AS') bg = 'bg-amber-500/20 border-amber-500/50';
                else if (v === 'AA') bg = 'bg-emerald-500/20 border-emerald-500/50';
                return (
                  <button key={col} onClick={() => {
                    const vals = ['', 'AA', 'AS', 'SS'];
                    const idx = vals.indexOf(v || '');
                    setData(d => ({...d, punnettCells: {...d.punnettCells, [k]: vals[(idx+1)%vals.length]}}));
                  }} className={`aspect-square rounded-lg border-2 font-mono-sci font-bold text-lg ${bg} text-white`}>
                    {v || '?'}
                  </button>
                );
              })}
            </div>
          ))}
          <p className="text-[11px] text-slate-500 text-center mt-3 italic">Clique sur une case pour changer le génotype</p>
        </div>
      </div>

      <div className="anim-in delay-200 card-border rounded-2xl p-5 mb-5">
        <p className="text-slate-100 font-bold mb-4">{T('phase5Q')}</p>
        <div className="grid grid-cols-2 gap-2">
          {[T('phase5A'), T('phase5B'), T('phase5C'), T('phase5D')].map((opt, idx) => {
            const isSel = selected === idx;
            const showC = answered && idx === 0;
            const showW = answered && isSel && idx !== 0;
            let cls = 'border-slate-700 bg-slate-900/40 text-slate-200';
            if (showC) cls = 'border-emerald-400 bg-emerald-500/10 text-emerald-100';
            else if (showW) cls = 'border-red-500 bg-red-500/10 text-red-100';
            else if (isSel) cls = 'border-amber-400 bg-amber-500/10 text-amber-100';
            return (
              <button key={idx} onClick={() => !answered && setSelected(idx)} disabled={answered}
                className={`p-3 rounded-lg border text-sm font-medium transition-all ${cls}`}>
                {opt}
              </button>
            );
          })}
        </div>
      </div>

      {answered && (
        <div className="card-border rounded-2xl p-5 mb-5 anim-in" style={{borderColor: wasCorrect ? 'rgba(16,185,129,0.4)' : 'rgba(239,68,68,0.4)', background: wasCorrect ? 'rgba(16,185,129,0.05)' : 'rgba(239,68,68,0.05)'}}>
          <div className="flex items-start gap-3">
            <span className={wasCorrect ? 'text-emerald-400' : 'text-red-400'}><Icon name={wasCorrect ? 'check' : 'alert'} size={20} /></span>
            <div>
              <p className={`text-xs uppercase tracking-wider font-bold mb-2 ${wasCorrect ? 'text-emerald-400' : 'text-red-400'}`}>
                {wasCorrect ? T('correct') + ' • +150 XP' : T('wrong') + ' • la bonne réponse est 1/4 (25 %)'}
              </p>
              <p className="text-sm text-slate-200 leading-relaxed">{T('phase5Explain')}</p>
            </div>
          </div>
        </div>
      )}

      <div className="flex justify-center" style={{marginTop: '1.5rem', marginBottom: '1.5rem'}}>
        {!answered ? (
          <button onClick={submit} disabled={selected === null}
            className={`px-8 py-3.5 rounded-full inline-flex items-center gap-3 ${selected === null ? 'bg-slate-800 text-slate-500' : 'btn-primary'}`}
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('confirm')} <Icon name="check" size={16} />
          </button>
        ) : (
          <button onClick={onNext} className="btn-primary px-8 py-3.5 rounded-full inline-flex items-center gap-3"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('continue')} <Icon name="arrow" size={16} />
          </button>
        )}
      </div>
    </div>
  );
}

// ============================================================
// EPILOGUE
// ============================================================
function Epilogue({ xp, onComplete }) {
  return (
    <div className="max-w-2xl mx-auto text-center">
      <div className="anim-in inline-flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-emerald-400/80 mb-4">
        <Icon name="check" size={14} /> <span>Mission accomplie</span>
      </div>
      <h2 className="anim-in delay-100 font-display text-4xl md:text-5xl mb-5"><span className="shimmer-text">{T('epilogueTitle')}</span></h2>
      <p className="anim-in delay-200 text-slate-300 text-base md:text-lg mb-8 leading-relaxed">{T('epilogueMsg')}</p>

      <div className="anim-in delay-300 card-border rounded-2xl p-5 mb-6 text-left">
        <p className="text-xs uppercase tracking-wider text-amber-400/80 font-bold mb-2">{T('epilogueConseil')}</p>
        <p className="text-slate-200 italic">« {T('epilogueConseilText')} »</p>
      </div>

      <div className="anim-in delay-400 grid grid-cols-3 gap-2 mb-6">
        <div className="card-border rounded-xl p-3">
          <div className="flex justify-center mb-1 text-amber-400"><Icon name="sparkles" size={20} /></div>
          <p className="font-mono-sci text-xl text-amber-300 font-bold">{xp}</p>
          <p className="text-[10px] uppercase tracking-wider text-slate-500 mt-0.5">XP</p>
        </div>
        <div className="card-border rounded-xl p-3">
          <div className="flex justify-center mb-1 text-amber-400"><Icon name="award" size={20} /></div>
          <p className="text-[11px] text-amber-200 font-bold leading-tight">Détective drépanocytose</p>
        </div>
        <div className="card-border rounded-xl p-3">
          <div className="flex justify-center mb-1 text-amber-400"><Icon name="bookOpen" size={20} /></div>
          <p className="text-[11px] text-amber-200 font-bold leading-tight">Hérédité autosomale récessive</p>
        </div>
      </div>

      <div className="anim-in delay-500 mb-8 py-5 border-t border-b border-amber-500/20">
        <p className="italic text-amber-200/90 text-lg">« {T('epiloguePhilo')} »</p>
      </div>

      <div className="anim-in delay-500 card-border rounded-2xl p-5 mb-8 text-left" style={{borderColor: 'rgba(251,191,36,0.4)'}}>
        <div className="flex items-center gap-2 mb-2 text-amber-400">
          <Icon name="zap" size={16} />
          <p className="text-xs uppercase tracking-wider font-bold">{T('epilogueMVR')}</p>
        </div>
        <p className="text-slate-200 leading-relaxed text-sm">{T('epilogueMVRText')}</p>
      </div>

      <button onClick={onComplete} className="anim-in delay-500 btn-primary px-8 py-3.5 rounded-full inline-flex items-center gap-3">
        <Icon name="home" size={16} /> {T('backHome')}
      </button>
      <p className="anim-in delay-500 mt-10 text-[10px] tracking-[0.3em] uppercase text-slate-700">{T('brand')}</p>
    </div>
  );
}

// ============================================================
// RENDER
// ============================================================
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
