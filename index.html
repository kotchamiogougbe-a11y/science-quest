// ============================================================
// PROGRESSION — Calcule prérequis et verrouillage
// Une mission est jouable si :
//   - elle est explicitement marquée locked: false sans requires (cas tutoriel/exploration)
//   - OU le mode libre est activé (state.freeMode)
//   - OU toutes ses missions prérequises sont complétées
// ============================================================
function getMissionPrereqs(missionId) {
  // Tutoriel : aucun prérequis
  if (missionId === 'drepanocytose') return [];
  // GENECODE : chaîne séquentielle après le tuto
  const gcChain = ['gc-1-1','gc-1-2','gc-2-1','gc-2-2','gc-2-3','gc-3-1','gc-3-2','gc-3-3','gc-4-1','gc-4-2','gc-4-3','gc-5-1','gc-5-2','gc-boss'];
  const gcIdx = gcChain.indexOf(missionId);
  if (gcIdx === 0) return ['drepanocytose'];
  if (gcIdx > 0) return [gcChain[gcIdx - 1]];
  // NEUROLINK : chaîne séquentielle indépendante (peut être commencée après le tuto)
  const nlChain = ['nl-1-1','nl-1-2','nl-1-3','nl-2-1','nl-2-2','nl-2-3','nl-3-1','nl-3-2','nl-3-3','nl-4-1','nl-4-2','nl-4-3','nl-5-1','nl-5-2','nl-boss'];
  const nlIdx = nlChain.indexOf(missionId);
  if (nlIdx === 0) return ['drepanocytose'];
  if (nlIdx > 0) return [nlChain[nlIdx - 1]];
  return [];
}

function isMissionPlayable(chap, completedMissions, freeMode) {
  if (chap.locked === true) return false; // verrouillé en dur (thèmes futurs)
  if (freeMode) return true;
  const prereqs = getMissionPrereqs(chap.id);
  return prereqs.every(p => completedMissions.includes(p));
}

function getMissionBlocker(chap, completedMissions) {
  const prereqs = getMissionPrereqs(chap.id);
  const missing = prereqs.filter(p => !completedMissions.includes(p));
  return missing[0] || null;
}

function SubjectCard({ subject, onStartMission, completedMissions, freeMode, delay }) {
  const [expanded, setExpanded] = useState(false);
  const allChapters = subject.parts.flatMap(p => p.themes.flatMap(t => t.chapters));
  const playableCount = allChapters.filter(c => isMissionPlayable(c, completedMissions, freeMode)).length;
  const completedCount = allChapters.filter(c => completedMissions.includes(c.id)).length;
  const total = allChapters.length;
  return (
    <div className="anim-in" style={{animationDelay: `${delay}s`}}>
      <button onClick={() => setExpanded(!expanded)} className="w-full card-border rounded-2xl p-5 text-left hover:border-amber-400/40 transition-all">
        <div className="flex items-center gap-4">
          <div className="w-12 h-12 rounded-xl flex items-center justify-center shrink-0" style={{background: `${subject.color}22`, border: `1px solid ${subject.color}44`, color: subject.color}}>
            <Icon name={subject.icon} size={22} />
          </div>
          <div className="flex-1 min-w-0">
            <h3 className="font-display text-xl text-amber-100 mb-0.5">{subject.name}</h3>
            <p className="text-xs text-slate-400">{subject.description}</p>
            {subject.role && (
              <p className="text-[11px] mt-1 font-semibold" style={{color: subject.color}}>
                Rôle : {subject.role}
              </p>
            )}
          </div>
          <div className="text-right shrink-0">
            <p className="font-mono-sci text-amber-300 text-sm">{completedCount}/{total}</p>
            <Icon name="chevron" size={16} color="#fbbf24" />
          </div>
        </div>
      </button>

      {expanded && (
        <div className="mt-3 ml-4 space-y-2 anim-in">
          {subject.parts.map(part => (
            <div key={part.id}>
              <p className="text-[10px] uppercase tracking-wider text-slate-500 mt-3 mb-2">{part.name}</p>
              {part.themes.map(theme => (
                <div key={theme.id} className="mb-3">
                  <p className="text-xs text-amber-200/80 font-semibold mb-1.5 pl-3 border-l-2 border-amber-500/30">{theme.name}</p>
                  {theme.chapters.map(chap => {
                    const isCompleted = completedMissions.includes(chap.id);
                    const playable = isMissionPlayable(chap, completedMissions, freeMode);
                    const blocker = !playable && !chap.locked ? getMissionBlocker(chap, completedMissions) : null;
                    return (
                      <button
                        key={chap.id}
                        onClick={() => { if (playable) onStartMission(chap.id); }}
                        disabled={!playable}
                        title={blocker ? `Termine d'abord : ${blocker}` : (chap.locked ? 'Disponible dans une prochaine mise à jour' : isCompleted ? 'Mission complétée — clique pour réviser' : '')}
                        className={`w-full text-left p-3 rounded-xl mb-1.5 flex items-center gap-3 transition-all ${!playable ? 'mission-locked bg-slate-900/40 border border-slate-800 cursor-not-allowed' : 'card-border hover:border-amber-400/60'}`}
                      >
                        <div className={`w-8 h-8 rounded-lg flex items-center justify-center shrink-0 ${!playable ? 'bg-slate-800' : isCompleted ? 'bg-emerald-500/20' : 'bg-amber-500/15'}`}>
                          <Icon name={!playable ? 'lock' : isCompleted ? 'check' : 'play'} size={14} color={!playable ? '#64748b' : isCompleted ? '#10b981' : '#fbbf24'} fill={playable && !isCompleted ? '#fbbf24' : 'none'} />
                        </div>
                        <div className="flex-1 min-w-0">
                          <p className="text-sm text-amber-100 truncate">{chap.name}</p>
                          <p className="text-[11px] text-slate-500 truncate">
                            {blocker ? `🔒 Termine d'abord la mission précédente` : `« ${chap.power} »`}
                          </p>
                        </div>
                        {isCompleted && (
                          <span className="text-[10px] px-2 py-0.5 rounded-full shrink-0" style={{background: 'rgba(16, 185, 129, 0.15)', color: '#6ee7b7', border: '1px solid rgba(16, 185, 129, 0.3)'}}>
                            🔄 Réviser
                          </span>
                        )}
                      </button>
                    );
                  })}
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ============================================================
// DAILY QUIZ — 5 questions, 60 secondes, bonus XP quotidien
// ============================================================
function DailyQuizScreen({ state, setState, onBack }) {
  const today = new Date().toISOString().slice(0, 10);
  const alreadyDone = (state.dailyQuizHistory || {})[today];
  const [phase, setPhase] = React.useState(alreadyDone ? 'done' : 'intro');
  const [currentQ, setCurrentQ] = React.useState(0);
  const [score, setScore] = React.useState(0);
  const [timeLeft, setTimeLeft] = React.useState(60);
  const [selected, setSelected] = React.useState(null);
  const [revealed, setRevealed] = React.useState(false);

  // Banque de questions du quiz éclair (5 questions tirées au sort dans une banque)
  const QUIZ_POOL = [
    { q: "Le gène de la drépanocytose est :", opts: ["Dominant", "Récessif", "Lié à X"], correct: 1 },
    { q: "Le potentiel de repos d'un neurone est environ :", opts: ["+30 mV", "0 mV", "–70 mV"], correct: 2 },
    { q: "L'hormone qui fait BAISSER la glycémie est :", opts: ["Glucagon", "Insuline", "Adrénaline"], correct: 1 },
    { q: "Combien de chromosomes possède un humain normal ?", opts: ["23", "46", "48"], correct: 1 },
    { q: "Un individu Aa est :", opts: ["Homozygote", "Hétérozygote", "Stérile"], correct: 1 },
    { q: "La mitose produit :", opts: ["2 cellules identiques", "4 gamètes", "1 cellule géante"], correct: 0 },
    { q: "Le syndrome de Down (trisomie 21) est :", opts: ["Mendélien", "Chromosomique", "Infectieux"], correct: 1 },
    { q: "L'axone d'un neurone sert à :", opts: ["Recevoir l'information", "Transmettre l'information", "Stocker l'énergie"], correct: 1 },
    { q: "Le diabète de type 1 est dû à :", opts: ["Manque d'insuline", "Excès d'insuline", "Manque de sucre"], correct: 0 },
    { q: "Les gamètes humains contiennent :", opts: ["46 chromosomes", "23 chromosomes", "Aucun chromosome"], correct: 1 },
    { q: "Le pH du sang est environ :", opts: ["6 (acide)", "7,4 (légèrement basique)", "8,5 (basique)"], correct: 1 },
    { q: "Un allèle dominant s'écrit avec :", opts: ["Une lettre minuscule", "Une lettre majuscule", "Un chiffre"], correct: 1 },
    { q: "La glycémie normale à jeun est environ :", opts: ["0,5 g/L", "1 g/L", "2 g/L"], correct: 1 },
    { q: "Le cycle cellulaire comprend :", opts: ["Interphase + Mitose", "Mitose seule", "Méiose + Mitose"], correct: 0 },
    { q: "La synapse est :", opts: ["Une cellule", "Une zone de contact entre neurones", "Un nerf"], correct: 1 }
  ];

  // Pioche aléatoire de 5 questions (stable pour la session)
  const questions = React.useMemo(() => {
    const pool = [...QUIZ_POOL];
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    // Pour chaque question, mélanger aussi les options
    return pool.slice(0, 5).map(q => {
      const indices = q.opts.map((_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      return {
        question: q.q,
        options: indices.map(i => q.opts[i]),
        correct: indices.indexOf(q.correct)
      };
    });
  // eslint-disable-next-line
  }, []);

  // Timer
  React.useEffect(() => {
    if (phase !== 'playing') return;
    if (timeLeft <= 0) { setPhase('finished'); return; }
    const id = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    return () => clearTimeout(id);
  }, [phase, timeLeft]);

  const startQuiz = () => {
    setPhase('playing');
    setCurrentQ(0);
    setScore(0);
    setTimeLeft(60);
    setSelected(null);
    setRevealed(false);
  };

  const submitAnswer = (idx) => {
    if (revealed) return;
    setSelected(idx);
    setRevealed(true);
    const isCorrect = idx === questions[currentQ].correct;
    if (isCorrect) {
      setScore(s => s + 1);
      SoundManager.play('correct');
    } else {
      SoundManager.play('wrong');
    }
    setTimeout(() => {
      if (currentQ + 1 >= questions.length) {
        setPhase('finished');
      } else {
        setCurrentQ(c => c + 1);
        setSelected(null);
        setRevealed(false);
      }
    }, 1200);
  };

  const finalize = () => {
    // Calculer le bonus XP : 20 XP par bonne réponse + 50 XP bonus si 5/5
    const bonusXP = score * 20 + (score === 5 ? 50 : 0);
    SoundManager.play('complete');
    MusicEngine.pulse('progression');
    setState(s => {
      const history = { ...(s.dailyQuizHistory || {}) };
      history[today] = { score, total: questions.length, xp: bonusXP };
      // Mise à jour xpHistory
      const xpHistory = [...(s.xpHistory || [])];
      const todayEntry = xpHistory.find(e => e.date === today);
      if (todayEntry) todayEntry.xp += bonusXP;
      else xpHistory.push({ date: today, xp: bonusXP });
      // Badge "Quiz parfait" si 5/5
      const badges = [...(s.badges || [])];
      if (score === 5 && !badges.includes('badge:quiz-perfect')) badges.push('badge:quiz-perfect');
      return {
        ...s,
        xp: (s.xp || 0) + bonusXP,
        dailyQuizHistory: history,
        xpHistory: xpHistory.slice(-30),
        badges
      };
    });
    onBack();
  };

  return (
    <div className="max-w-2xl mx-auto" style={{paddingTop: '2vh'}}>
      <button onClick={onBack} className="btn-ghost px-3 py-1.5 rounded-full text-xs inline-flex items-center gap-1.5 mb-6"
        style={{opacity: 1, visibility: 'visible'}}>
        ← Retour à l'Académie
      </button>

      {phase === 'intro' && (
        <div className="text-center anim-in">
          <div className="text-6xl mb-4">⚡</div>
          <h1 className="font-display text-3xl text-amber-100 mb-3">Quiz Éclair Quotidien</h1>
          <p className="text-slate-300 text-base leading-relaxed mb-6 px-4">
            <strong className="text-amber-300">5 questions, 60 secondes</strong>.<br/>
            Reviens chaque jour pour tester tes réflexes scientifiques.
          </p>
          <div className="card-border rounded-xl p-4 mb-6 max-w-sm mx-auto">
            <p className="text-[10px] uppercase tracking-wider text-amber-400/80 mb-2">Récompenses</p>
            <p className="text-slate-200 text-sm leading-relaxed">+ 20 XP par bonne réponse<br/>+ 50 XP bonus si 5/5<br/>🏅 Badge « Quiz parfait »</p>
          </div>
          <button onClick={startQuiz} className="btn-primary px-8 py-3 rounded-full inline-flex items-center gap-2 mega-pulse"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            <Icon name="play" size={16} fill="currentColor" /> Lancer le quiz
          </button>
        </div>
      )}

      {phase === 'playing' && (
        <div className="anim-in">
          <div className="flex items-center justify-between mb-4">
            <p className="text-xs uppercase tracking-[0.2em] text-amber-400/70">Question {currentQ + 1}/{questions.length}</p>
            <div className="flex items-center gap-2">
              <span className={`px-3 py-1 rounded-full text-sm font-mono-sci tabular-nums ${timeLeft <= 10 ? 'text-red-400' : 'text-amber-300'}`}
                style={{background: timeLeft <= 10 ? 'rgba(239,68,68,0.15)' : 'rgba(245,158,11,0.12)', border: '1px solid ' + (timeLeft <= 10 ? '#ef4444' : '#f59e0b')}}>
                ⏱ {timeLeft}s
              </span>
              <span className="px-3 py-1 rounded-full text-sm font-mono-sci tabular-nums text-emerald-300"
                style={{background: 'rgba(16,185,129,0.12)', border: '1px solid #10b981'}}>
                {score}/{questions.length}
              </span>
            </div>
          </div>
          <div className="card-border rounded-2xl p-5 mb-5">
            <p className="text-slate-100 text-lg leading-relaxed">{questions[currentQ].question}</p>
          </div>
          <div className="space-y-2.5">
            {questions[currentQ].options.map((opt, i) => {
              const isSel = selected === i;
              const isCorrect = revealed && i === questions[currentQ].correct;
              const isWrong = revealed && isSel && i !== questions[currentQ].correct;
              let style = { borderColor: '#334155', background: 'rgba(15, 23, 42, 0.4)' };
              if (isCorrect) style = { borderColor: '#10b981', background: 'rgba(16,185,129,0.1)' };
              else if (isWrong) style = { borderColor: '#ef4444', background: 'rgba(239,68,68,0.1)' };
              else if (isSel) style = { borderColor: '#f59e0b', background: 'rgba(245,158,11,0.1)' };
              return (
                <button
                  key={i}
                  onClick={() => submitAnswer(i)}
                  disabled={revealed}
                  className="w-full text-left p-4 rounded-xl border-2 transition-all"
                  style={style}
                >
                  <div className="flex items-center gap-3">
                    <span className={`w-7 h-7 rounded-full border-2 flex items-center justify-center shrink-0 text-xs font-bold ${isCorrect ? 'border-emerald-400 bg-emerald-400 text-slate-950' : isWrong ? 'border-red-500 bg-red-500 text-white' : 'border-slate-600 text-slate-500'}`}>
                      {isCorrect ? '✓' : isWrong ? '✗' : String.fromCharCode(65 + i)}
                    </span>
                    <span className="text-sm text-slate-100">{opt}</span>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {phase === 'finished' && (
        <div className="text-center anim-in">
          <div className="text-7xl mb-4">{score === 5 ? '🏆' : score >= 3 ? '✨' : '💪'}</div>
          <h1 className="font-display text-3xl text-amber-100 mb-3">
            {score === 5 ? 'Sans faute !' : score >= 3 ? 'Bien joué !' : 'Continue'}
          </h1>
          <p className="text-amber-200 text-2xl font-mono-sci mb-2">{score} / {questions.length}</p>
          <p className="text-slate-400 text-sm mb-6">Score du jour</p>
          <div className="card-border rounded-xl p-4 mb-6 max-w-sm mx-auto">
            <p className="text-[10px] uppercase tracking-wider text-amber-400/80 mb-2">XP gagnés</p>
            <p className="font-display text-3xl text-amber-100">+ {score * 20 + (score === 5 ? 50 : 0)}</p>
            {score === 5 && <p className="text-xs text-amber-300 mt-2">🏅 Badge « Quiz parfait » débloqué</p>}
          </div>
          <p className="text-slate-300 text-sm italic mb-6 px-4">
            « Reviens demain pour un nouveau quiz. La rigueur quotidienne, c'est l'excellence. »
            <br/><span className="text-[10px] text-slate-500">— Dr Kotchami</span>
          </p>
          <button onClick={finalize} className="btn-primary px-8 py-3 rounded-full inline-flex items-center gap-2"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            Valider mon score
          </button>
        </div>
      )}

      {phase === 'done' && (
        <div className="text-center anim-in">
          <div className="text-6xl mb-4">✅</div>
          <h1 className="font-display text-2xl text-amber-100 mb-3">Quiz du jour déjà terminé</h1>
          <p className="text-amber-200 text-xl font-mono-sci mb-6">{alreadyDone.score} / {alreadyDone.total}</p>
          <p className="text-slate-300 text-sm mb-6 italic px-4">
            Reviens demain pour un nouveau quiz éclair !
          </p>
          <button onClick={onBack} className="btn-ghost px-6 py-2.5 rounded-full text-sm">
            Retour à l'Académie
          </button>
        </div>
      )}
    </div>
  );
}

// CHALLENGE MODE — Une seule erreur permise = perdu
// ============================================================
function ChallengeScreen({ state, setState, onBack }) {
  const [phase, setPhase] = React.useState('intro');
  const [currentQ, setCurrentQ] = React.useState(0);
  const [timeLeft, setTimeLeft] = React.useState(180);
  const [selected, setSelected] = React.useState(null);
  const [revealed, setRevealed] = React.useState(false);
  const [failed, setFailed] = React.useState(false);

  // Banque ÉLITE : 8 questions vraiment difficiles, mélangées
  const ELITE_POOL = [
    { q: "Une mère AaBb × Père aaBb : quelle est la probabilité d'un enfant aabb ?", opts: ["1/16", "1/8", "1/4", "1/2"], correct: 1 },
    { q: "Un père [I^A i] et une mère [I^B I^B] : groupes possibles de l'enfant ?", opts: ["A et B", "AB et B", "A et AB", "AB et O"], correct: 1 },
    { q: "Lors d'un PA, la phase de dépolarisation est due à :", opts: ["Sortie de K+", "Entrée de Na+", "Sortie de Cl-", "Entrée de Ca++"], correct: 1 },
    { q: "Une glycémie à jeun de 1,40 g/L correspond à :", opts: ["Normal", "Prédiabète", "Diabète", "Hypoglycémie"], correct: 2 },
    { q: "Le syndrome de Klinefelter correspond à :", opts: ["XYY", "XXY", "X0", "XXX"], correct: 1 },
    { q: "La méiose réductionnelle se produit en :", opts: ["Méiose I", "Méiose II", "Mitose", "Phase G1"], correct: 0 },
    { q: "L'insuline est sécrétée par :", opts: ["Cellules α", "Cellules β", "Foie", "Reins"], correct: 1 },
    { q: "La drépanocytose résulte d'une mutation sur la chaîne :", opts: ["α de l'hémoglobine", "β de l'hémoglobine", "γ", "δ"], correct: 1 }
  ];

  const questions = React.useMemo(() => {
    const pool = [...ELITE_POOL];
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    return pool.slice(0, 5).map(q => {
      const indices = q.opts.map((_, i) => i);
      for (let i = indices.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [indices[i], indices[j]] = [indices[j], indices[i]];
      }
      return {
        question: q.q,
        options: indices.map(i => q.opts[i]),
        correct: indices.indexOf(q.correct)
      };
    });
  // eslint-disable-next-line
  }, []);

  React.useEffect(() => {
    if (phase !== 'playing') return;
    if (timeLeft <= 0) { setFailed(true); setPhase('finished'); return; }
    const id = setTimeout(() => setTimeLeft(t => t - 1), 1000);
    return () => clearTimeout(id);
  }, [phase, timeLeft]);

  const startChallenge = () => {
    setPhase('playing');
    setCurrentQ(0);
    setTimeLeft(180);
    setSelected(null);
    setRevealed(false);
    setFailed(false);
  };

  const submitAnswer = (idx) => {
    if (revealed) return;
    setSelected(idx);
    setRevealed(true);
    const isCorrect = idx === questions[currentQ].correct;
    if (isCorrect) {
      SoundManager.play('correct');
      setTimeout(() => {
        if (currentQ + 1 >= questions.length) setPhase('finished');
        else { setCurrentQ(c => c + 1); setSelected(null); setRevealed(false); }
      }, 1000);
    } else {
      SoundManager.play('wrong');
      MusicEngine.pulse('tension');
      setFailed(true);
      setTimeout(() => setPhase('finished'), 2000);
    }
  };

  const finalize = () => {
    if (!failed) {
      SoundManager.play('complete');
      MusicEngine.pulse('progression');
      setState(s => {
        const badges = [...(s.badges || [])];
        if (!badges.includes('badge:challenger')) badges.push('badge:challenger');
        const today = new Date().toISOString().slice(0, 10);
        const xpHistory = [...(s.xpHistory || [])];
        const todayEntry = xpHistory.find(e => e.date === today);
        if (todayEntry) todayEntry.xp += 200;
        else xpHistory.push({ date: today, xp: 200 });
        return { ...s, xp: (s.xp || 0) + 200, badges, xpHistory: xpHistory.slice(-30) };
      });
    }
    onBack();
  };

  return (
    <div className="max-w-2xl mx-auto" style={{paddingTop: '2vh'}}>
      <button onClick={onBack} className="btn-ghost px-3 py-1.5 rounded-full text-xs inline-flex items-center gap-1.5 mb-6"

          <div className="card-border rounded-xl p-4 mb-6 max-w-sm mx-auto" style={{borderColor: 'rgba(239, 68, 68, 0.3)'}}>
            <p className="text-[10px] uppercase tracking-wider text-red-400/80 mb-2">Récompense</p>
            <p className="text-slate-200 text-sm leading-relaxed">+ 200 XP<br/>🏅 Badge « Challenger »</p>
          </div>
          <p className="text-xs italic text-slate-400 mb-6 px-4">
            « C'est dans la pression que se révèle la vraie compréhension. »<br/>
            <span className="text-[10px] text-slate-500">— Dr Kotchami</span>
          </p>
          <button onClick={startChallenge} className="btn-primary px-8 py-3 rounded-full inline-flex items-center gap-2 mega-pulse"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex', background: 'linear-gradient(135deg, #dc2626, #f59e0b)'}}>
            🎯 Lancer le défi
          </button>
        </div>
      )}

      {phase === 'playing' && (
        <div className="anim-in">
          <div className="flex items-center justify-between mb-4">
            <p className="text-xs uppercase tracking-[0.2em] text-amber-400/70">Question {currentQ + 1}/{questions.length}</p>
            <span className={`px-3 py-1 rounded-full text-sm font-mono-sci tabular-nums ${timeLeft <= 30 ? 'text-red-400' : 'text-amber-300'}`}
              style={{background: timeLeft <= 30 ? 'rgba(239,68,68,0.15)' : 'rgba(245,158,11,0.12)', border: '1px solid ' + (timeLeft <= 30 ? '#ef4444' : '#f59e0b')}}>
              ⏱ {Math.floor(timeLeft / 60)}:{(timeLeft % 60).toString().padStart(2, '0')}
            </span>
          </div>
          <div className="card-border rounded-2xl p-5 mb-5">
            <p className="text-slate-100 text-base leading-relaxed">{questions[currentQ].question}</p>
          </div>
          <div className="space-y-2.5">
            {questions[currentQ].options.map((opt, i) => {
              const isSel = selected === i;
              const isCorrect = revealed && i === questions[currentQ].correct;
              const isWrong = revealed && isSel && i !== questions[currentQ].correct;
              let style = { borderColor: '#334155', background: 'rgba(15, 23, 42, 0.4)' };
              if (isCorrect) style = { borderColor: '#10b981', background: 'rgba(16,185,129,0.1)' };
              else if (isWrong) style = { borderColor: '#ef4444', background: 'rgba(239,68,68,0.1)' };
              return (
                <button key={i} onClick={() => submitAnswer(i)} disabled={revealed}
                  className="w-full text-left p-4 rounded-xl border-2 transition-all" style={style}>
                  <div className="flex items-center gap-3">
                    <span className={`w-7 h-7 rounded-full border-2 flex items-center justify-center shrink-0 text-xs font-bold ${isCorrect ? 'border-emerald-400 bg-emerald-400 text-slate-950' : isWrong ? 'border-red-500 bg-red-500 text-white' : 'border-slate-600 text-slate-500'}`}>
                      {isCorrect ? '✓' : isWrong ? '✗' : String.fromCharCode(65 + i)}
                    </span>
                    <span className="text-sm text-slate-100">{opt}</span>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {phase === 'finished' && (
        <div className="text-center anim-in">
          <div className="text-7xl mb-4">{failed ? '💔' : '🏆'}</div>
          <h1 className="font-display text-3xl text-amber-100 mb-3">
            {failed ? 'Défi raté' : 'Défi réussi !'}
          </h1>
          <p className="text-slate-300 text-base mb-6 px-4 italic">
            {failed
              ? "« Une erreur, ce n'est pas un échec — c'est une information. Reviens t'entraîner et reviens. »"
              : "« 5 sur 5 sans une erreur. C'est l'excellence pure. Continue. »"}
            <br/><span className="text-[10px] text-slate-500">— Dr Kotchami</span>
          </p>
          {!failed && (
            <div className="card-border rounded-xl p-4 mb-6 max-w-sm mx-auto">
              <p className="text-[10px] uppercase tracking-wider text-amber-400/80 mb-2">Récompenses</p>
              <p className="text-slate-200 text-sm">+ 200 XP<br/>🏅 Badge « Challenger »</p>
            </div>
          )}
          <button onClick={finalize} className="btn-primary px-8 py-3 rounded-full">
            Retour
          </button>
        </div>
      )}
    </div>
  );
}

// ============================================================
// XP SPARKLINE — Mini-graphique XP des 7 derniers jours
// ============================================================
function XPSparkline({ history }) {
  // history = [{date: 'YYYY-MM-DD', xp: number}, ...]
  const today = new Date();
  const last7 = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const ds = d.toISOString().slice(0, 10);
    const entry = history.find(h => h.date === ds);
    last7.push({
      date: ds,
      label: ['D','L','M','M','J','V','S'][d.getDay()],
      xp: entry ? entry.xp : 0
    });
  }
  const maxXp = Math.max(1, ...last7.map(d => d.xp));
  const totalWeek = last7.reduce((acc, d) => acc + d.xp, 0);
  return (
    <div>
      <div className="flex items-end justify-between gap-1.5 h-20 mb-2">
        {last7.map((d, i) => {
          const h = (d.xp / maxXp) * 100;
          const isToday = i === 6;
          return (
            <div key={d.date} className="flex-1 flex flex-col items-center gap-1">
              <div className="w-full flex items-end" style={{height: '64px'}}>
                <div
                  className="w-full rounded-t transition-all"
                  style={{
                    height: `${h}%`,
                    minHeight: d.xp > 0 ? '3px' : '0',
                    background: isToday ? 'linear-gradient(to top, #f59e0b, #fbbf24)' : 'linear-gradient(to top, rgba(245, 158, 11, 0.4), rgba(245, 158, 11, 0.6))',
                    opacity: 1
                  }}
                  title={`${d.date} — +${d.xp} XP`}
                />
              </div>
              <p className="text-[9px] text-slate-500 font-mono-sci">{d.label}</p>
            </div>
          );
        })}
      </div>
      <p className="text-[10px] text-amber-300/80 text-center">
        Total semaine : <span className="font-mono-sci">+{totalWeek} XP</span>
      </p>
    </div>
  );
}

// ============================================================
// MISSION FLOW
// ============================================================
function MissionFlow({ phase, setPhase, state, setState, missionData, setMissionData, addXP, loseLife, onComplete, onExit, elapsedSeconds }) {
  const phases = ['intro', 'prologue', 'briefing', 'p1', 'p2', 'p3', 'p4', 'p5', 'epilogue'];
  const currentIdx = phases.indexOf(phase);
  const progress = ((currentIdx) / (phases.length - 1)) * 100;
  const [mentorMsg, setMentorMsg] = React.useState(null);
  const [correctStreak, setCorrectStreak] = React.useState(0);

  // Rotation des mentors pour le tuto (Mariama spécialiste génétique, Salamatou clinique, Kotchami philo, Fatima soutien)
  const mentorRotation = React.useMemo(() => pickMentorRotation('drepanocytose'), []);

  const showMentor = (mentorId, msg) => {
    if (state && state.mentorEnabled === false) return;
    if (!msg) return;
    setMentorMsg({ char: mentorId, msg, key: Date.now() });
  };
  const showMentorFrom = (kind, indexHint) => {
    if (state && state.mentorEnabled === false) return;
    const mentorId = mentorRotation[(indexHint != null ? indexHint : Math.floor(Math.random() * mentorRotation.length)) % mentorRotation.length];
    const msg = pickMentorMsg(mentorId, kind);
    if (msg) showMentor(mentorId, msg);
  };

  // Apparitions automatiques mentors aux moments clés du tuto
  // Kotchami est GARANTI au briefing et à l'épilogue
  React.useEffect(() => {
    if (state && state.mentorEnabled === false) return;
    if (phase === 'briefing') {
      // Intro tuto par Kotchami philosophe (toujours)
      setTimeout(() => showMentor('kotchami', pickMentorMsg('kotchami', 'intro')), 700);
    } else if (phase === 'p1') {
      // Mariama prend le relais sur l'enquête génétique
      setTimeout(() => showMentorFrom('intro', 0), 600);
    } else if (phase === 'p3') {
      // À mi-parcours du tuto, Kotchami intervient
      setTimeout(() => showMentor('kotchami', pickMentorMsg('kotchami', 'midway')), 800);
    } else if (phase === 'epilogue') {
      // Clôture : Kotchami signe le tuto
      setTimeout(() => showMentor('kotchami', pickMentorMsg('kotchami', 'outro')), 1200);
    }
    // eslint-disable-next-line
  }, [phase]);

  // Mood musical adaptatif pour le tuto
  React.useEffect(() => {
    if (phase === 'intro') MusicEngine.setMood('exploration');
    else if (phase === 'prologue' || phase === 'briefing') MusicEngine.setMood('activation');
    else if (phase === 'p1' || phase === 'p2' || phase === 'p3' || phase === 'p4' || phase === 'p5') {
      MusicEngine.setMood('concentration');
    } else if (phase === 'epilogue') MusicEngine.setMood('reflexion');
    // eslint-disable-next-line
  }, [phase]);

  // Wrappers pour ajouter sons, mentors variés et impulsions musicales
  const handleCorrect = (xp) => {
    SoundManager.play('correct');
    MusicEngine.pulse('validation');
    const ns = correctStreak + 1;
    let multiplier = 1;
    if (ns >= 5) multiplier = 1.5;
    else if (ns >= 3) multiplier = 1.2;
    addXP(Math.round(xp * multiplier));
    setCorrectStreak(ns);
    if (ns === 3) showMentorFrom('success3', 0);
    else if (ns === 5) showMentorFrom('success5', 2);
  };
  const handleWrong = () => {
    SoundManager.play('wrong');
    MusicEngine.pulse('tension');
    loseLife();
    setCorrectStreak(0);
    showMentorFrom('wrong', Math.floor(Math.random() * mentorRotation.length));
  };

  const goPrevious = () => {
    if (currentIdx > 0) setPhase(phases[currentIdx - 1]);
  };

  const phaseLabels = {
    intro: 'Intro', prologue: 'Prologue', briefing: 'Briefing',
    p1: 'Enquête', p2: 'Analyse 1', p3: 'Analyse 2',
    p4: 'Pedigree', p5: 'Calcul', epilogue: 'Épilogue'
  };

  return (
    <div>
      {phase !== 'intro' && phase !== 'epilogue' && (
        <div className="mb-8 anim-in">
          <div className="flex items-center justify-between mb-2 gap-3">
            <button
              onClick={goPrevious}
              className="btn-ghost px-3 py-1.5 rounded-full text-xs inline-flex items-center gap-1.5 shrink-0"
              style={{opacity: 1, visibility: 'visible'}}
              title={`Retour à : ${phaseLabels[phases[currentIdx - 1]]}`}
            >
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" style={{display: 'inline-block', verticalAlign: 'middle'}}>
                <path d="m15 18-6-6 6-6"/>
              </svg>
              <span>Retour</span>
            </button>
            <p className="text-[10px] uppercase tracking-wider text-slate-500 text-center flex-1">Phase {currentIdx} / {phases.length - 2} — {phaseLabels[phase]}</p>
            <div className="text-xs font-mono-sci tabular-nums shrink-0 flex items-center gap-2" style={{minWidth: '70px', justifyContent: 'flex-end'}}>
              {state && state.timerEnabled !== false && typeof elapsedSeconds === 'number' && (
                <span className="text-slate-400" title="Temps de mission">⏱ {formatTime(elapsedSeconds)}</span>
              )}
            </div>
          </div>
          <div className="progress-bar"><div className="progress-bar-fill" style={{width: `${progress}%`}}></div></div>
        </div>
      )}

      {phase === 'intro' && <MissionIntro onStart={() => setPhase('prologue')} onBack={onExit} />}
      {phase === 'prologue' && <Prologue onNext={() => setPhase('briefing')} />}
      {phase === 'briefing' && <Briefing onNext={() => setPhase('p1')} />}

      {phase === 'p1' && <Phase1Investigation
        seen={missionData.seenCharacters}
        selected={missionData.selectedChar}
        onSelect={(c) => setMissionData(d => ({...d, selectedChar: c, seenCharacters: new Set([...d.seenCharacters, c.id])}))}
        onNext={() => setPhase('p2')} />}

      {phase === 'p2' && <QuestionPhase
        title={T('phase2Title')} question={T('phase2Q')}
        options={[T('phase2A'), T('phase2B'), T('phase2C')]} correctIdx={1}
        explain={T('phase2Explain')}
        onCorrect={() => handleCorrect(100)} onWrong={handleWrong}
        onNext={() => setPhase('p3')} />}

      {phase === 'p3' && <QuestionPhase
        title={T('phase3Title')} question={T('phase3Q')}
        options={[T('phase3A'), T('phase3B'), T('phase3C')]} correctIdx={1}
        explain={T('phase3Explain')}
        onCorrect={() => handleCorrect(100)} onWrong={handleWrong}
        onNext={() => setPhase('p4')} />}

      {phase === 'p4' && <Phase4Pedigree
        data={missionData} setData={setMissionData}
        onCorrect={() => handleCorrect(150)} onWrong={handleWrong}
        onNext={() => setPhase('p5')} />}

      {phase === 'p5' && <Phase5Punnett
        data={missionData} setData={setMissionData}
        onCorrect={() => handleCorrect(150)} onWrong={handleWrong}
        onNext={() => setPhase('epilogue')} />}

      {phase === 'epilogue' && <Epilogue xp={missionData.missionXP} onComplete={onComplete} />}

      {mentorMsg && (
        <MentorBubble
          key={mentorMsg.key}
          character={mentorMsg.char}
          message={mentorMsg.msg}
          onClose={() => setMentorMsg(null)}
        />
      )}
    </div>
  );
}

// ============================================================
// QUESTION PHASE (avec révélation pédagogique)
// ============================================================
function QuestionPhase({ title, question, options, correctIdx, explain, onCorrect, onWrong, onNext }) {
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [wasCorrect, setWasCorrect] = useState(false);

  // Mélange aléatoire des options pour éviter que la bonne réponse soit toujours à la même position
  // shuffled[i] = index original ; on calcule la nouvelle position de la bonne réponse
  const shuffled = React.useMemo(() => {
    const indices = options.map((_, i) => i);
    for (let i = indices.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indices[i], indices[j]] = [indices[j], indices[i]];
    }
    return indices;
  // eslint-disable-next-line
  }, [question]);
  const displayedOptions = shuffled.map(i => options[i]);
  const newCorrectIdx = shuffled.indexOf(correctIdx);
  const correctLetter = String.fromCharCode(65 + newCorrectIdx);

  const submit = () => {
    if (selected === null) return;
    const correct = selected === newCorrectIdx;
    setWasCorrect(correct);
    setAnswered(true);
    if (correct) onCorrect(); else onWrong();
  };

  return (
    <div className="max-w-2xl mx-auto">
      <div className="anim-in text-center mb-6">
        <p className="inline-flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-amber-400/60 mb-3"><Icon name="target" size={14} /> Analyse</p>
        <h2 className="font-display text-2xl md:text-3xl">{title}</h2>
      </div>

      <div className="anim-in delay-100 card-border rounded-2xl p-5 mb-5">
        <p className="text-slate-100 text-base md:text-lg leading-relaxed">{question}</p>
      </div>

      <div className="space-y-2.5 mb-5">
        {displayedOptions.map((opt, idx) => {
          const isSel = selected === idx;
          const showCorrect = answered && idx === newCorrectIdx;
          const showWrong = answered && isSel && idx !== newCorrectIdx;
          let cls = 'border-slate-700 bg-slate-900/40 text-slate-200';
          if (showCorrect) cls = 'border-emerald-400 bg-emerald-500/10 text-emerald-100';
          else if (showWrong) cls = 'border-red-500 bg-red-500/10 text-red-100';
          else if (isSel) cls = 'border-amber-400 bg-amber-500/10 text-amber-100';
          return (
            <button key={idx} onClick={() => !answered && setSelected(idx)} disabled={answered}
              className={`anim-in w-full text-left p-4 rounded-xl border transition-all ${cls}`}
              style={{animationDelay: `${0.15 + idx * 0.06}s`}}>
              <div className="flex items-start gap-3">
                <div className={`w-7 h-7 rounded-full border-2 flex items-center justify-center shrink-0 mt-0.5 text-xs font-bold ${
                  showCorrect ? 'border-emerald-400 bg-emerald-400 text-slate-950' :
                  showWrong ? 'border-red-500 bg-red-500 text-white' :
                  isSel ? 'border-amber-400 bg-amber-400 text-slate-950' : 'border-slate-600 text-slate-500'
                }`}>
                  {showCorrect ? <Icon name="check" size={14} /> : showWrong ? <Icon name="x" size={14} /> : String.fromCharCode(65 + idx)}
                </div>
                <span className="text-sm md:text-base leading-relaxed">{opt}</span>
              </div>
            </button>
          );
        })}
      </div>

      {answered && (
        <div className={`card-border rounded-2xl p-5 mb-5 anim-in`} style={{borderColor: wasCorrect ? 'rgba(16,185,129,0.4)' : 'rgba(239,68,68,0.4)', background: wasCorrect ? 'rgba(16,185,129,0.05)' : 'rgba(239,68,68,0.05)'}}>
          <div className="flex items-start gap-3">
            <span className={wasCorrect ? 'text-emerald-400' : 'text-red-400'}><Icon name={wasCorrect ? 'check' : 'alert'} size={20} /></span>
            <div>
              <p className={`text-xs uppercase tracking-wider font-bold mb-2 ${wasCorrect ? 'text-emerald-400' : 'text-red-400'}`}>
                {wasCorrect ? T('correct') + ' • +100 XP' : T('wrong') + ' • la bonne réponse est la ' + correctLetter}
              </p>
              <p className="text-sm text-slate-200 leading-relaxed">{explain}</p>
            </div>
          </div>
        </div>
      )}

      <div className="flex justify-center" style={{marginTop: '1.5rem', marginBottom: '1.5rem'}}>
        {!answered ? (
          <button onClick={submit} disabled={selected === null}
            className={`px-8 py-3.5 rounded-full inline-flex items-center gap-3 ${selected === null ? 'bg-slate-800 text-slate-500' : 'btn-primary'}`}
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('confirm')} <Icon name="check" size={16} />
          </button>
        ) : (
          <button onClick={onNext} className="btn-primary px-8 py-3.5 rounded-full inline-flex items-center gap-3"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('continue')} <Icon name="arrow" size={16} />
          </button>
        )}
      </div>
    </div>
  );
}

// PHASE 4 — Pedigree
// ============================================================
function Phase4Pedigree({ data, setData, onCorrect, onWrong, onNext }) {
  const gen1 = FAMILY.filter(f => f.gen === 1);
  const gen2 = FAMILY.filter(f => f.gen === 2);
  const gen3 = FAMILY.filter(f => f.gen === 3);

  const check = () => {
    const errors = [];
    FAMILY.forEach(c => {
      const v = data.genotypes[c.id];
      if (!v) errors.push(c.id);
      else if (c.expected === 'AAorAS' && !['AA','AS'].includes(v)) errors.push(c.id);
      else if (c.expected === 'AS' && v !== 'AS') errors.push(c.id);
      else if (c.expected === 'SS' && v !== 'SS') errors.push(c.id);
    });
    setData(d => ({...d, pedigreeChecked: true, pedigreeErrors: errors}));
    if (errors.length === 0) onCorrect(); else onWrong();
  };

  const renderRow = (members) => (
    <div className="flex justify-around items-end flex-wrap gap-3">
      {members.map(m => (
        <div key={m.id} className="flex flex-col items-center">
          <div onClick={() => setData(d => ({...d, selectedChar: m}))} style={{cursor: 'pointer', transform: data.selectedChar?.id === m.id ? 'scale(1.1)' : 'scale(1)', transition: 'transform 0.2s'}}>
            <CharIcon sex={m.sex} affected={m.affected} size={50}
              selected={data.selectedChar?.id === m.id}
              error={data.pedigreeChecked && data.pedigreeErrors.includes(m.id)} />
          </div>
          {data.genotypes[m.id] && (
            <p className="text-center text-xs font-mono-sci font-bold mt-1" style={{color: data.pedigreeChecked && data.pedigreeErrors.includes(m.id) ? '#fca5a5' : '#fde68a'}}>
              {data.genotypes[m.id]}
            </p>
          )}
          <p className="text-[10px] text-slate-400 mt-0.5 text-center max-w-[80px] leading-tight">{m.name}</p>
        </div>
      ))}
    </div>
  );

  return (
    <div>
      <div className="anim-in text-center mb-6">
        <p className="inline-flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-amber-400/60 mb-3"><Icon name="dna" size={14} /> {T('phase4Title')}</p>
        <p className="text-slate-400 max-w-2xl mx-auto text-sm">{T('phase4Intro')}</p>
      </div>

      <div className="card-border rounded-2xl p-5 md:p-7 mb-5 anim-in delay-100">
        <div className="space-y-6">
          <div><p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 mb-2 text-center">Génération I</p>{renderRow(gen1)}</div>
          <div className="flex justify-center"><div className="h-px w-16 bg-amber-500/20"></div></div>
          <div><p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 mb-2 text-center">Génération II</p>{renderRow(gen2)}</div>
          <div className="flex justify-center"><div className="h-px w-16 bg-amber-500/20"></div></div>
          <div><p className="text-[10px] uppercase tracking-[0.2em] text-slate-500 mb-2 text-center">Génération III</p>{renderRow(gen3)}</div>
        </div>
      </div>

      {data.selectedChar && (
        <div className="card-border rounded-2xl p-5 mb-5 anim-in">
          <div className="flex items-center gap-3 mb-3">
            <CharIcon sex={data.selectedChar.sex} affected={data.selectedChar.affected} size={40} />
            <div>
              <p className="font-display text-lg text-amber-100">{data.selectedChar.name}</p>
              <p className="text-xs text-slate-400">{data.selectedChar.role}</p>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-2">
            {[{v: 'AA', l: 'sain'}, {v: 'AS', l: 'porteur'}, {v: 'SS', l: 'malade'}].map(opt => {
              const sel = data.genotypes[data.selectedChar.id] === opt.v;
              return (
                <button key={opt.v} onClick={() => setData(d => ({...d, genotypes: {...d.genotypes, [data.selectedChar.id]: opt.v}}))}
                  className={`px-3 py-2.5 rounded-lg text-sm border transition-all ${sel ? 'border-amber-400 bg-amber-500/20 text-amber-100' : 'border-slate-700 bg-slate-900/50 text-slate-300'}`}>
                  <span className="font-mono-sci font-bold mr-1.5">{opt.v}</span>
                  <span className="text-xs opacity-70">{opt.l}</span>
                </button>
              );
            })}
          </div>
          {data.selectedChar.expected === 'AAorAS' && (
            <p className="text-xs text-slate-500 mt-2 italic">Indice : génotype non déterminable avec certitude. AA ou AS seront acceptés.</p>
          )}
        </div>
      )}

      {data.pedigreeChecked && data.pedigreeErrors.length === 0 && (
        <div className="card-border rounded-xl p-4 mb-5 anim-in" style={{borderColor: 'rgba(16,185,129,0.4)', background: 'rgba(16,185,129,0.05)'}}>
          <div className="flex items-center gap-3">
            <span className="text-emerald-400"><Icon name="check" size={20} /></span>
            <p className="text-sm text-emerald-200">{T('phase4Success')} • +150 XP</p>
          </div>
        </div>
      )}
      {data.pedigreeChecked && data.pedigreeErrors.length > 0 && (
        <div className="card-border rounded-xl p-4 mb-5 anim-in" style={{borderColor: 'rgba(239,68,68,0.4)', background: 'rgba(239,68,68,0.05)'}}>
          <div className="flex items-start gap-3">
            <span className="text-red-400 mt-0.5"><Icon name="x" size={18} /></span>
            <p className="text-sm text-red-200">{T('phase4Error')}</p>
          </div>
        </div>
      )}

      <div className="flex justify-center gap-3" style={{marginTop: '1.5rem', marginBottom: '1.5rem'}}>
        {!data.pedigreeChecked || data.pedigreeErrors.length > 0 ? (
          <button onClick={check} disabled={Object.keys(data.genotypes).length < FAMILY.length}
            className={`px-8 py-3.5 rounded-full inline-flex items-center gap-3 ${Object.keys(data.genotypes).length < FAMILY.length ? 'bg-slate-800 text-slate-500' : 'btn-primary'}`}
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('phase4Check')} <Icon name="check" size={16} />
          </button>
        ) : (
          <button onClick={onNext} className="btn-primary px-8 py-3.5 rounded-full inline-flex items-center gap-3"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('continue')} <Icon name="arrow" size={16} />
          </button>
        )}
      </div>
    </div>
  );
}

// ============================================================
// PHASE 5 — Punnett
// ============================================================
function Phase5Punnett({ data, setData, onCorrect, onWrong, onNext }) {
  const [selected, setSelected] = useState(null);
  const [answered, setAnswered] = useState(false);
  const [wasCorrect, setWasCorrect] = useState(false);

  const submit = () => {
    if (selected === null) return;
    const c = selected === 0;
    setWasCorrect(c); setAnswered(true);
    if (c) onCorrect(); else onWrong();
  };

  return (
    <div className="max-w-2xl mx-auto">
      <div className="anim-in text-center mb-6">
        <p className="inline-flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-amber-400/60 mb-3"><Icon name="dna" size={14} /> {T('phase5Title')}</p>
        <p className="text-slate-400 max-w-xl mx-auto text-sm">{T('phase5Intro')}</p>
      </div>

      <div className="anim-in delay-100 card-border rounded-2xl p-5 mb-5">
        <p className="text-xs uppercase tracking-wider text-amber-400/80 font-bold mb-4 text-center">Échiquier AS × AS</p>
        <div className="max-w-xs mx-auto">
          <div className="grid grid-cols-3 gap-2 mb-2">
            <div></div>
            <div className="text-center font-display font-bold text-amber-300 text-xl">A</div>
            <div className="text-center font-display font-bold text-red-400 text-xl">S</div>
          </div>
          {[0,1].map(row => (
            <div key={row} className="grid grid-cols-3 gap-2 mb-2">
              <div className="text-center font-display font-bold text-xl" style={{color: row === 0 ? '#fcd34d' : '#f87171'}}>{row === 0 ? 'A' : 'S'}</div>
              {[0,1].map(col => {
                const k = `${row},${col}`;
                const v = data.punnettCells[k];
                let bg = 'bg-slate-900/50 border-slate-700';
                if (v === 'SS') bg = 'bg-red-500/20 border-red-500/50';
                else if (v === 'AS') bg = 'bg-amber-500/20 border-amber-500/50';
                else if (v === 'AA') bg = 'bg-emerald-500/20 border-emerald-500/50';
                return (
                  <button key={col} onClick={() => {
                    const vals = ['', 'AA', 'AS', 'SS'];
                    const idx = vals.indexOf(v || '');
                    setData(d => ({...d, punnettCells: {...d.punnettCells, [k]: vals[(idx+1)%vals.length]}}));
                  }} className={`aspect-square rounded-lg border-2 font-mono-sci font-bold text-lg ${bg} text-white`}>
                    {v || '?'}
                  </button>
                );
              })}
            </div>
          ))}
          <p className="text-[11px] text-slate-500 text-center mt-3 italic">Clique sur une case pour changer le génotype</p>
        </div>
      </div>

      <div className="anim-in delay-200 card-border rounded-2xl p-5 mb-5">
        <p className="text-slate-100 font-bold mb-4">{T('phase5Q')}</p>
        <div className="grid grid-cols-2 gap-2">
          {[T('phase5A'), T('phase5B'), T('phase5C'), T('phase5D')].map((opt, idx) => {
            const isSel = selected === idx;
            const showC = answered && idx === 0;
            const showW = answered && isSel && idx !== 0;
            let cls = 'border-slate-700 bg-slate-900/40 text-slate-200';
            if (showC) cls = 'border-emerald-400 bg-emerald-500/10 text-emerald-100';
            else if (showW) cls = 'border-red-500 bg-red-500/10 text-red-100';
            else if (isSel) cls = 'border-amber-400 bg-amber-500/10 text-amber-100';
            return (
              <button key={idx} onClick={() => !answered && setSelected(idx)} disabled={answered}
                className={`p-3 rounded-lg border text-sm font-medium transition-all ${cls}`}>
                {opt}
              </button>
            );
          })}
        </div>
      </div>

      {answered && (
        <div className="card-border rounded-2xl p-5 mb-5 anim-in" style={{borderColor: wasCorrect ? 'rgba(16,185,129,0.4)' : 'rgba(239,68,68,0.4)', background: wasCorrect ? 'rgba(16,185,129,0.05)' : 'rgba(239,68,68,0.05)'}}>
          <div className="flex items-start gap-3">
            <span className={wasCorrect ? 'text-emerald-400' : 'text-red-400'}><Icon name={wasCorrect ? 'check' : 'alert'} size={20} /></span>
            <div>
              <p className={`text-xs uppercase tracking-wider font-bold mb-2 ${wasCorrect ? 'text-emerald-400' : 'text-red-400'}`}>
                {wasCorrect ? T('correct') + ' • +150 XP' : T('wrong') + ' • la bonne réponse est 1/4 (25 %)'}
              </p>
              <p className="text-sm text-slate-200 leading-relaxed">{T('phase5Explain')}</p>
            </div>
          </div>
        </div>
      )}

      <div className="flex justify-center" style={{marginTop: '1.5rem', marginBottom: '1.5rem'}}>
        {!answered ? (
          <button onClick={submit} disabled={selected === null}
            className={`px-8 py-3.5 rounded-full inline-flex items-center gap-3 ${selected === null ? 'bg-slate-800 text-slate-500' : 'btn-primary'}`}
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('confirm')} <Icon name="check" size={16} />
          </button>
        ) : (
          <button onClick={onNext} className="btn-primary px-8 py-3.5 rounded-full inline-flex items-center gap-3"
            style={{opacity: 1, visibility: 'visible', display: 'inline-flex'}}>
            {T('continue')} <Icon name="arrow" size={16} />
          </button>
        )}
      </div>
    </div>
  );
}

// ============================================================
// EPILOGUE
// ============================================================
function Epilogue({ xp, onComplete }) {
  return (
    <div className="max-w-2xl mx-auto text-center">
      <div className="anim-in inline-flex items-center gap-2 text-xs uppercase tracking-[0.3em] text-emerald-400/80 mb-4">
        <Icon name="check" size={14} /> <span>Mission accomplie</span>
      </div>
      <h2 className="anim-in delay-100 font-display text-4xl md:text-5xl mb-5"><span className="shimmer-text">{T('epilogueTitle')}</span></h2>
      <p className="anim-in delay-200 text-slate-300 text-base md:text-lg mb-8 leading-relaxed">{T('epilogueMsg')}</p>

      <div className="anim-in delay-300 card-border rounded-2xl p-5 mb-6 text-left">
        <p className="text-xs uppercase tracking-wider text-amber-400/80 font-bold mb-2">{T('epilogueConseil')}</p>
        <p className="text-slate-200 italic">« {T('epilogueConseilText')} »</p>
      </div>

      <div className="anim-in delay-400 grid grid-cols-3 gap-2 mb-6">
        <div className="card-border rounded-xl p-3">
          <div className="flex justify-center mb-1 text-amber-400"><Icon name="sparkles" size={20} /></div>
          <p className="font-mono-sci text-xl text-amber-300 font-bold">{xp}</p>
          <p className="text-[10px] uppercase tracking-wider text-slate-500 mt-0.5">XP</p>
        </div>
        <div className="card-border rounded-xl p-3">
          <div className="flex justify-center mb-1 text-amber-400"><Icon name="award" size={20} /></div>
          <p className="text-[11px] text-amber-200 font-bold leading-tight">Détective drépanocytose</p>
        </div>
        <div className="card-border rounded-xl p-3">
          <div className="flex justify-center mb-1 text-amber-400"><Icon name="bookOpen" size={20} /></div>
          <p className="text-[11px] text-amber-200 font-bold leading-tight">Hérédité autosomale récessive</p>
        </div>
      </div>

      <div className="anim-in delay-500 mb-8 py-5 border-t border-b border-amber-500/20">
        <p className="italic text-amber-200/90 text-lg">« {T('epiloguePhilo')} »</p>
      </div>

      <div className="anim-in delay-500 card-border rounded-2xl p-5 mb-8 text-left" style={{borderColor: 'rgba(251,191,36,0.4)'}}>
        <div className="flex items-center gap-2 mb-2 text-amber-400">
          <Icon name="zap" size={16} />
          <p className="text-xs uppercase tracking-wider font-bold">{T('epilogueMVR')}</p>
        </div>
        <p className="text-slate-200 leading-relaxed text-sm">{T('epilogueMVRText')}</p>
      </div>

      <button onClick={onComplete} className="anim-in delay-500 btn-primary px-8 py-3.5 rounded-full inline-flex items-center gap-3">
        <Icon name="home" size={16} /> {T('backHome')}
      </button>
      <p className="anim-in delay-500 mt-10 text-[10px] tracking-[0.3em] uppercase text-slate-700">{T('brand')}</p>
    </div>
  );
}

// ============================================================
// RENDER
// ============================================================
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
